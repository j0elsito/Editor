<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Studio Suite | techexchange Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        input[type="range"] { accent-color: #cbfb45; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // JSON Por defecto: Tema de reparación para probar reemplazo de Emojis por Fotos
        const initialJSON = {
          "config": { "width": 1080, "height": 1920, "fps": 60, "duration": 5.0, "background": "#0f172a" },
          "elements": [
            {
              "id": "halo_fondo", "type": "circle", "x": 540, "y": 960, "radius": 400, "color": "#1e293b", "blur": 100,
              "animations": [ { "prop": "scale", "from": 0, "to": 1.5, "start": 0, "end": 2, "ease": "easeOut" } ]
            },
            {
              "id": "telefono_cliente", "type": "image", "src": "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4f1.svg",
              "x": 540, "y": 960, "width": 450, "height": 450, "anchor": "center", "shadowBlur": 40, "shadowColor": "#cbfb45",
              "animations": [
                { "prop": "y", "from": -200, "to": 960, "start": 0.5, "end": 1.5, "ease": "easeOutBounce" },
                { "prop": "rotation", "from": -45, "to": 0, "start": 0.5, "end": 1.5, "ease": "easeOutBounce" }
              ]
            },
            {
              "id": "mano_reparadora_izq", "type": "image", "src": "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/270b.svg",
              "x": 200, "y": 1400, "width": 250, "height": 250, "anchor": "center",
              "animations": [
                { "prop": "x", "from": -200, "to": 300, "start": 1.5, "end": 2.2, "ease": "easeOutBounce" },
                { "prop": "y", "from": 1400, "to": 1100, "start": 1.5, "end": 2.2, "ease": "easeOutBounce" },
                { "prop": "rotation", "from": -90, "to": 15, "start": 1.5, "end": 2.2, "ease": "easeOut" }
              ]
            },
            {
              "id": "mano_reparadora_der", "type": "image", "src": "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/270b.svg",
              "x": 880, "y": 1400, "width": 250, "height": 250, "anchor": "center",
              "animations": [
                { "prop": "x", "from": 1280, "to": 780, "start": 1.7, "end": 2.4, "ease": "easeOutBounce" },
                { "prop": "y", "from": 1400, "to": 1100, "start": 1.7, "end": 2.4, "ease": "easeOutBounce" },
                { "prop": "rotation", "from": 90, "to": -15, "start": 1.7, "end": 2.4, "ease": "easeOut" }
              ]
            },
            {
              "id": "marca", "type": "text", "text": "techexchange", "x": 540, "y": 300, "fontSize": 80, "color": "#ffffff",
              "animations": [
                { "prop": "opacity", "from": 0, "to": 1, "start": 2.5, "end": 3.0, "ease": "linear" }
              ]
            }
          ]
        };

        const Easing = {
            linear: t => t,
            easeOut: t => 1 - Math.pow(1 - t, 3),
            easeInOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
            easeOutBounce: t => {
                const n1 = 7.5625, d1 = 2.75;
                if (t < 1 / d1) return n1 * t * t;
                if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
                if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
                return n1 * (t -= 2.625 / d1) * t + 0.984375;
            }
        };

        const hexToRgb = (hex) => {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
        };

        const interpolateColor = (color1, color2, factor) => {
            const c1 = hexToRgb(color1); const c2 = hexToRgb(color2);
            return `rgb(${Math.round(c1.r + factor * (c2.r - c1.r))}, ${Math.round(c1.g + factor * (c2.g - c1.g))}, ${Math.round(c1.b + factor * (c2.b - c1.b))})`;
        };

        function App() {
            const [data, setData] = useState(initialJSON);
            const [jsonText, setJsonText] = useState(JSON.stringify(initialJSON, null, 2));
            const [time, setTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [playbackSpeed, setPlaybackSpeed] = useState(1.0); // NUEVO: Velocidad Global
            const [selectedId, setSelectedId] = useState(null);
            const [imagesAssets, setImagesAssets] = useState({});
            
            const canvasRef = useRef(null);
            const animRef = useRef(null);
            const containerRef = useRef(null);

            // PRELOADER
            const loadImages = async (elements) => {
                const loaded = { ...imagesAssets };
                const promises = elements.filter(el => el.type === 'image' && el.src).map(el => {
                    return new Promise((resolve) => {
                        if (loaded[el.id] && loaded[el.id].src === el.src) { resolve(); return; }
                        const img = new Image();
                        img.crossOrigin = "Anonymous";
                        img.onload = () => { loaded[el.id] = img; resolve(); };
                        img.onerror = () => { resolve(); };
                        img.src = el.src;
                    });
                });
                await Promise.all(promises);
                setImagesAssets(loaded);
            };

            useEffect(() => { loadImages(data.elements); }, [data]);

            // MOTOR DE VALORES ANIMADOS
            const getAnimatedValue = (element, propName, defaultValue, currentT) => {
                const anims = element.animations?.filter(a => a.prop === propName);
                if (!anims || anims.length === 0) return defaultValue;

                let currentValue = anims[0].from;
                for (const anim of anims) {
                    if (currentT < anim.start) continue;
                    if (currentT >= anim.end) { currentValue = anim.to; continue; }
                    const progress = (currentT - anim.start) / (anim.end - anim.start);
                    const easeFn = Easing[anim.ease || 'linear'] || Easing.linear;
                    if (propName.toLowerCase().includes('color')) {
                        currentValue = interpolateColor(anim.from, anim.to, easeFn(progress));
                    } else {
                        currentValue = anim.from + (anim.to - anim.from) * easeFn(progress);
                    }
                }
                return currentValue;
            };

            // RENDERIZADOR NÚCLEO
            const renderCanvas = (currentT) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = data.config.background || "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                data.elements.forEach(el => {
                    ctx.save();
                    
                    const x = getAnimatedValue(el, 'x', el.x || 0, currentT);
                    const y = getAnimatedValue(el, 'y', el.y || 0, currentT);
                    const scale = getAnimatedValue(el, 'scale', el.scale || 1, currentT);
                    const opacity = getAnimatedValue(el, 'opacity', el.opacity !== undefined ? el.opacity : 1, currentT);
                    const rot = getAnimatedValue(el, 'rotation', el.rotation || 0, currentT);
                    const blur = getAnimatedValue(el, 'blur', el.blur || 0, currentT);
                    const grayscale = getAnimatedValue(el, 'grayscale', el.grayscale || 0, currentT);
                    const shadowBlur = getAnimatedValue(el, 'shadowBlur', el.shadowBlur || 0, currentT);
                    const color = el.type !== 'image' ? getAnimatedValue(el, 'color', el.color || "#ffffff", currentT) : null;

                    ctx.globalAlpha = Math.max(0, Math.min(1, opacity));
                    
                    let filterStr = "";
                    if (blur > 0) filterStr += `blur(${blur}px) `;
                    if (grayscale > 0) filterStr += `grayscale(${grayscale}%)`;
                    if (filterStr) ctx.filter = filterStr.trim();

                    if (shadowBlur > 0) {
                        ctx.shadowBlur = shadowBlur;
                        ctx.shadowColor = getAnimatedValue(el, 'shadowColor', el.shadowColor || color || "#000000", currentT);
                    }
                    
                    ctx.translate(x, y);
                    ctx.rotate(rot * Math.PI / 180);
                    ctx.scale(scale, scale);

                    if (el.type === 'image') {
                        const img = imagesAssets[el.id];
                        if (img) {
                            const w = getAnimatedValue(el, 'width', el.width || img.width, currentT);
                            const h = getAnimatedValue(el, 'height', el.height || img.height, currentT);
                            if (el.anchor === 'center') ctx.drawImage(img, -w/2, -h/2, w, h);
                            else ctx.drawImage(img, 0, 0, w, h);
                        }
                    }
                    else if (el.type === 'rect') {
                        const w = getAnimatedValue(el, 'width', el.width, currentT);
                        const h = getAnimatedValue(el, 'height', el.height, currentT);
                        const radius = getAnimatedValue(el, 'borderRadius', el.borderRadius || 0, currentT);
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        if (el.anchor === 'center') {
                            if (radius > 0) ctx.roundRect(-w/2, -h/2, w, h, radius); else ctx.rect(-w/2, -h/2, w, h);
                        } else {
                            if (radius > 0) ctx.roundRect(0, 0, w, h, radius); else ctx.rect(0, 0, w, h);
                        }
                        ctx.fill();
                    } 
                    else if (el.type === 'circle') {
                        const r = getAnimatedValue(el, 'radius', el.radius, currentT);
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        ctx.arc(0, 0, r, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    else if (el.type === 'text') {
                        ctx.fillStyle = color;
                        ctx.font = `${el.fontWeight || 'bold'} ${el.fontSize}px ${el.fontFamily || 'sans-serif'}`;
                        ctx.textAlign = el.textAlign || "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(el.text, 0, 0);
                    }

                    // DIBUJAR CAJA DE SELECCIÓN (Solo UI)
                    if (el.id === selectedId && !isExporting) {
                        ctx.strokeStyle = "#cbfb45";
                        ctx.lineWidth = 4 / scale; // Mantener grosor constante visualmente
                        ctx.setLineDash([10 / scale, 10 / scale]);
                        
                        const w = el.width || (el.radius ? el.radius * 2 : 200);
                        const h = el.height || (el.radius ? el.radius * 2 : 100);
                        
                        if (el.anchor === 'center' || el.type === 'circle' || el.type === 'text') {
                            ctx.strokeRect(-w/2 - 10, -h/2 - 10, w + 20, h + 20);
                        } else {
                            ctx.strokeRect(-10, -10, w + 20, h + 20);
                        }
                    }

                    ctx.restore();
                });
            };

            // BUCLE DE REPRODUCCIÓN (Afectado por Velocidad Global)
            useEffect(() => {
                if (isPlaying && !isExporting) {
                    let lastTime = performance.now();
                    const loop = (now) => {
                        // Multiplicar el Delta Time por la velocidad seleccionada
                        const dt = ((now - lastTime) / 1000) * playbackSpeed;
                        lastTime = now;
                        setTime(prev => {
                            const next = prev + dt;
                            return next > data.config.duration ? 0 : next;
                        });
                        animRef.current = requestAnimationFrame(loop);
                    };
                    animRef.current = requestAnimationFrame(loop);
                } else {
                    cancelAnimationFrame(animRef.current);
                }
                return () => cancelAnimationFrame(animRef.current);
            }, [isPlaying, data.config.duration, isExporting, playbackSpeed]);

            useEffect(() => { if (!isExporting) renderCanvas(time); }, [time, data, isExporting, selectedId, imagesAssets]);

            // SISTEMA DE SELECCIÓN (HIT-DETECTION)
            const handleCanvasClick = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                
                // Mapear coordenadas del mouse a la resolución interna del canvas (1080x1920)
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clickX = (e.clientX - rect.left) * scaleX;
                const clickY = (e.clientY - rect.top) * scaleY;
                
                // Buscar colisión desde el elemento más arriba (reverso)
                let hitId = null;
                for (let i = data.elements.length - 1; i >= 0; i--) {
                    const el = data.elements[i];
                    const x = getAnimatedValue(el, 'x', el.x || 0, time);
                    const y = getAnimatedValue(el, 'y', el.y || 0, time);
                    
                    // Cálculo de bounding box aproximado
                    const w = el.width || (el.radius ? el.radius * 2 : 300);
                    const h = el.height || (el.radius ? el.radius * 2 : 100);
                    
                    let minX = el.anchor === 'center' || el.type === 'circle' || el.type === 'text' ? x - w/2 : x;
                    let maxX = minX + w;
                    let minY = el.anchor === 'center' || el.type === 'circle' || el.type === 'text' ? y - h/2 : y;
                    let maxY = minY + h;

                    if (clickX >= minX && clickX <= maxX && clickY >= minY && clickY <= maxY) {
                        hitId = el.id;
                        break;
                    }
                }
                setSelectedId(hitId);
            };

            // ACTUALIZAR PROPIEDADES EN TIEMPO REAL
            const updateElementProperty = (prop, value) => {
                if(!selectedId) return;
                const newElements = data.elements.map(el => el.id === selectedId ? { ...el, [prop]: value } : el);
                const newData = { ...data, elements: newElements };
                setData(newData);
                setJsonText(JSON.stringify(newData, null, 2));
            };

            // SUBIR IMAGEN (Convierte cualquier elemento a Imagen)
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !selectedId) return;
                
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const newSrc = ev.target.result;
                    const newElements = data.elements.map(el => {
                        if (el.id === selectedId) {
                            // Guardamos el tipo original por si el usuario borra la imagen
                            return { ...el, type: 'image', src: newSrc, _originalType: el.type !== 'image' ? el.type : (el._originalType || 'rect') };
                        }
                        return el;
                    });
                    const newData = { ...data, elements: newElements };
                    setData(newData);
                    setJsonText(JSON.stringify(newData, null, 2));
                };
                reader.readAsDataURL(file);
            };

            // BORRAR IMAGEN (Revierte al tipo original)
            const handleRemoveImage = () => {
                if(!selectedId) return;
                const newElements = data.elements.map(el => {
                    if (el.id === selectedId) {
                        const { src, _originalType, ...rest } = el;
                        return { ...rest, type: _originalType || 'rect' }; // Vuelve a ser un rectángulo si no hay tipo previo
                    }
                    return el;
                });
                const newData = { ...data, elements: newElements };
                setData(newData);
                setJsonText(JSON.stringify(newData, null, 2));
                
                // Limpiar del caché de imágenes
                const newAssets = {...imagesAssets};
                delete newAssets[selectedId];
                setImagesAssets(newAssets);
            };

            // EXPORTAR VIDEO SIN FALLOS
            const handleExport = async () => {
                if (!canvasRef.current) return;
                setSelectedId(null); // Quitar selector antes de grabar
                setIsPlaying(false);
                setIsExporting(true);
                setTime(0);

                // Esperamos 1 frame para asegurar que la caja de selección desapareció visualmente
                await new Promise(r => setTimeout(r, 50));

                const stream = canvasRef.current.captureStream(data.config.fps);
                const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
                const chunks = [];
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `techexchange_render_${Date.now()}.webm`; a.click();
                    setIsExporting(false);
                    setTime(0);
                    renderCanvas(0);
                };

                mediaRecorder.start();

                let startTime = performance.now();
                let exportFrameId;

                const exportLoop = (now) => {
                    // Exportar respetando la velocidad global elegida
                    const elapsedTime = ((now - startTime) / 1000) * playbackSpeed;
                    if (elapsedTime > data.config.duration) {
                        mediaRecorder.stop();
                        cancelAnimationFrame(exportFrameId);
                        return;
                    }
                    setTime(elapsedTime);
                    renderCanvas(elapsedTime);
                    exportFrameId = requestAnimationFrame(exportLoop);
                };

                exportFrameId = requestAnimationFrame(exportLoop);
            };

            // Sincronizar editor de texto con el Canvas
            const handleJsonChange = (e) => {
                setJsonText(e.target.value);
                try { const parsed = JSON.parse(e.target.value); setData(parsed); } catch(err) {}
            };

            const selectedElement = data.elements.find(el => el.id === selectedId);

            return (
                <div className="flex h-screen overflow-hidden flex-row">
                    
                    {/* PANEL IZQUIERDO: JSON & CONTROLES GLOBALES */}
                    <div className="w-1/4 bg-slate-900 border-r border-slate-800 flex flex-col shadow-2xl z-20">
                        <div className="p-4 bg-slate-950 border-b border-slate-800 flex items-center justify-between">
                            <h2 className="font-bold text-amber-500 text-sm tracking-wider"><i className="fas fa-code mr-2"></i>SOURCE CODE</h2>
                        </div>
                        <textarea 
                            value={jsonText} 
                            onChange={handleJsonChange}
                            className="flex-1 bg-slate-900 p-4 text-emerald-400 font-mono text-xs focus:outline-none resize-none leading-relaxed"
                            spellCheck="false"
                        ></textarea>
                        
                        {/* CONTROL DE VELOCIDAD GLOBAL */}
                        <div className="p-4 bg-slate-950 border-t border-slate-800">
                            <label className="text-xs font-bold text-slate-400 flex justify-between mb-2">
                                <span><i className="fas fa-gauge-high mr-2"></i>Velocidad de Animación:</span>
                                <span className="text-amber-500">{playbackSpeed.toFixed(1)}x</span>
                            </label>
                            <input 
                                type="range" min="0.2" max="3.0" step="0.1" value={playbackSpeed} 
                                onChange={(e) => setPlaybackSpeed(parseFloat(e.target.value))} 
                                className="w-full cursor-pointer"
                            />
                        </div>
                    </div>

                    {/* PANEL CENTRAL: CANVAS & REPRODUCTOR */}
                    <div className="flex-1 flex flex-col relative" ref={containerRef}>
                        {isExporting && (
                            <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center flex-col backdrop-blur-md">
                                <i className="fas fa-compact-disc animate-spin text-5xl text-amber-500 mb-6"></i>
                                <h2 className="text-2xl font-bold tracking-tight">Renderizando Producción...</h2>
                                <p className="text-slate-400 mt-2 font-mono text-sm">Grabando a {data.config.fps} FPS puros | Velocidad: {playbackSpeed}x</p>
                            </div>
                        )}
                        
                        <div className="flex-1 flex items-center justify-center p-8 overflow-hidden relative">
                            <div className="relative shadow-2xl shadow-indigo-900/10 border border-slate-800 rounded-lg overflow-hidden bg-black" style={{ height: '80vh', aspectRatio: '9/16' }}>
                                <canvas 
                                    ref={canvasRef} 
                                    width={data.config.width} 
                                    height={data.config.height} 
                                    onClick={handleCanvasClick}
                                    className="w-full h-full object-contain cursor-crosshair"
                                ></canvas>
                            </div>
                        </div>

                        {/* REPRODUCTOR */}
                        <div className="h-20 bg-slate-900 border-t border-slate-800 px-8 flex items-center justify-between z-10">
                            <div className="flex items-center space-x-6">
                                <button onClick={() => setTime(0)} className="text-slate-400 hover:text-white text-xl transition-colors"><i className="fas fa-backward-step"></i></button>
                                <button onClick={() => setIsPlaying(!isPlaying)} className="w-12 h-12 bg-amber-500 hover:bg-amber-400 rounded-full text-black flex items-center justify-center text-xl shadow-lg transition-transform hover:scale-105">
                                    <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play ml-1'}`}></i>
                                </button>
                                <span className="font-mono text-amber-500 text-sm font-bold bg-slate-950 px-3 py-1.5 rounded-lg border border-slate-800">
                                    {time.toFixed(2)}s / {data.config.duration}s
                                </span>
                            </div>
                            <button onClick={handleExport} className="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-bold px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2 transition-all">
                                <i className="fas fa-video"></i>
                                <span>Exportar Master</span>
                            </button>
                        </div>
                    </div>

                    {/* PANEL DERECHO: INSPECTOR VISUAL */}
                    <div className="w-1/4 bg-slate-900 border-l border-slate-800 flex flex-col z-20 shadow-2xl overflow-y-auto">
                        <div className="p-4 bg-slate-950 border-b border-slate-800">
                            <h2 className="font-bold text-amber-500 text-sm tracking-wider"><i className="fas fa-sliders mr-2"></i>PROPIEDADES</h2>
                        </div>
                        
                        <div className="p-6">
                            {!selectedId ? (
                                <div className="text-center py-10 opacity-50">
                                    <i className="fas fa-mouse-pointer text-4xl mb-4 text-slate-500"></i>
                                    <p className="text-sm">Haz clic en un elemento del lienzo para editarlo visualmente.</p>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    {/* CABECERA INSPECTOR */}
                                    <div className="flex justify-between items-center border-b border-slate-800 pb-4">
                                        <div>
                                            <span className="text-xs text-slate-500 block uppercase tracking-wider">Elemento Seleccionado</span>
                                            <span className="font-bold text-lg text-emerald-400">{selectedElement?.id}</span>
                                        </div>
                                        <div className="bg-slate-800 text-xs px-2 py-1 rounded border border-slate-700">{selectedElement?.type}</div>
                                    </div>

                                    {/* CARGA DE ARCHIVOS (MAGIA) */}
                                    <div className="bg-slate-950 p-4 rounded-lg border border-slate-800">
                                        <label className="text-xs font-bold text-slate-400 mb-3 flex items-center">
                                            <i className="fas fa-image mr-2"></i> Reemplazar por Archivo Local
                                        </label>
                                        
                                        <label className="flex items-center justify-center w-full h-24 px-4 transition bg-slate-900 border-2 border-slate-700 border-dashed rounded-md appearance-none cursor-pointer hover:border-amber-500 focus:outline-none mb-3">
                                            <span className="flex items-center space-x-2">
                                                <i className="fas fa-upload text-slate-400"></i>
                                                <span className="font-medium text-slate-400 text-sm">Subir PNG / JPG</span>
                                            </span>
                                            <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                                        </label>

                                        {selectedElement?.type === 'image' && (
                                            <button onClick={handleRemoveImage} className="w-full bg-red-900/50 hover:bg-red-800/80 text-red-300 text-xs py-2 rounded border border-red-800 transition-colors flex items-center justify-center">
                                                <i className="fas fa-trash-can mr-2"></i> Borrar Imagen y Revertir Forma
                                            </button>
                                        )}
                                    </div>

                                    {/* CONTROLES RÁPIDOS */}
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs text-slate-400 flex justify-between mb-1">
                                                <span>Posición X</span>
                                                <span>{selectedElement?.x || 0}</span>
                                            </label>
                                            <input type="range" min="0" max="1080" value={selectedElement?.x || 0} onChange={(e) => updateElementProperty('x', parseInt(e.target.value))} className="w-full" />
                                        </div>
                                        
                                        <div>
                                            <label className="text-xs text-slate-400 flex justify-between mb-1">
                                                <span>Posición Y</span>
                                                <span>{selectedElement?.y || 0}</span>
                                            </label>
                                            <input type="range" min="0" max="1920" value={selectedElement?.y || 0} onChange={(e) => updateElementProperty('y', parseInt(e.target.value))} className="w-full" />
                                        </div>

                                        {(selectedElement?.type === 'rect' || selectedElement?.type === 'image') && (
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-xs text-slate-400 block mb-1">Ancho</label>
                                                    <input type="number" value={selectedElement?.width || 0} onChange={(e) => updateElementProperty('width', parseInt(e.target.value))} className="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-sm text-white focus:border-amber-500 outline-none" />
                                                </div>
                                                <div>
                                                    <label className="text-xs text-slate-400 block mb-1">Alto</label>
                                                    <input type="number" value={selectedElement?.height || 0} onChange={(e) => updateElementProperty('height', parseInt(e.target.value))} className="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-sm text-white focus:border-amber-500 outline-none" />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
