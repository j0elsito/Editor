<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Graphics Engine Pro 🎨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; margin: 0; font-family: monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // JSON Pro de Ejemplo: techexchange con Glow, Blur, Grayscale y Transiciones de Color
        const initialJSON = {
          "config": {
            "width": 1080,
            "height": 1920,
            "fps": 60,
            "duration": 5.0,
            "background": "#020617" 
          },
          "elements": [
            {
              "id": "halo_resplandor",
              "type": "circle",
              "x": 540,
              "y": 960,
              "radius": 300,
              "color": "#1e293b",
              "blur": 100,
              "animations": [
                { "prop": "color", "from": "#020617", "to": "#3b82f6", "start": 1.0, "end": 2.5, "ease": "easeInOut" },
                { "prop": "scale", "from": 0.5, "to": 1.5, "start": 1.0, "end": 4.0, "ease": "easeOutBounce" }
              ]
            },
            {
              "id": "logo_box",
              "type": "rect",
              "x": 540,
              "y": 960,
              "width": 600,
              "height": 200,
              "color": "#000000",
              "anchor": "center",
              "shadowBlur": 40,
              "shadowColor": "#cbfb45",
              "animations": [
                { "prop": "grayscale", "from": 100, "to": 0, "start": 0.5, "end": 1.5, "ease": "linear" },
                { "prop": "blur", "from": 50, "to": 0, "start": 0.0, "end": 1.5, "ease": "easeOut" },
                { "prop": "shadowBlur", "from": 0, "to": 80, "start": 1.5, "end": 2.5, "ease": "easeOutBounce" },
                { "prop": "y", "from": 1100, "to": 960, "start": 0.5, "end": 1.5, "ease": "easeOut" }
              ]
            },
            {
              "id": "brand_text",
              "type": "text",
              "text": "techexchange",
              "x": 540,
              "y": 960,
              "fontSize": 80,
              "color": "#ffffff",
              "animations": [
                { "prop": "color", "from": "#475569", "to": "#cbfb45", "start": 1.5, "end": 2.5, "ease": "easeInOut" },
                { "prop": "blur", "from": 20, "to": 0, "start": 0.5, "end": 1.5, "ease": "easeOut" },
                { "prop": "y", "from": 1100, "to": 960, "start": 0.5, "end": 1.5, "ease": "easeOut" }
              ]
            },
            {
              "id": "scan_line",
              "type": "line",
              "x1": 240,
              "y1": 850,
              "x2": 840,
              "y2": 850,
              "color": "#ffffff",
              "lineWidth": 4,
              "shadowBlur": 20,
              "shadowColor": "#ffffff",
              "animations": [
                { "prop": "opacity", "from": 0, "to": 1, "start": 2.5, "end": 2.8, "ease": "linear" },
                { "prop": "y1", "from": 850, "to": 1070, "start": 2.5, "end": 3.5, "ease": "easeInOut" },
                { "prop": "y2", "from": 850, "to": 1070, "start": 2.5, "end": 3.5, "ease": "easeInOut" },
                { "prop": "opacity", "from": 1, "to": 0, "start": 3.3, "end": 3.5, "ease": "linear" }
              ]
            }
          ]
        };

        // --- MOTORES MATEMÁTICOS ---
        const Easing = {
            linear: t => t,
            easeOut: t => 1 - Math.pow(1 - t, 3),
            easeInOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
            easeOutBounce: t => {
                const n1 = 7.5625, d1 = 2.75;
                if (t < 1 / d1) return n1 * t * t;
                if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
                if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
                return n1 * (t -= 2.625 / d1) * t + 0.984375;
            }
        };

        const hexToRgb = (hex) => {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
        };

        const interpolateColor = (color1, color2, factor) => {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + factor * (c2.r - c1.r));
            const g = Math.round(c1.g + factor * (c2.g - c1.g));
            const b = Math.round(c1.b + factor * (c2.b - c1.b));
            return `rgb(${r}, ${g}, ${b})`;
        };

        function App() {
            const [jsonText, setJsonText] = useState(JSON.stringify(initialJSON, null, 2));
            const [data, setData] = useState(initialJSON);
            const [time, setTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const canvasRef = useRef(null);
            const animRef = useRef(null);

            const handleSync = () => {
                try {
                    setData(JSON.parse(jsonText));
                    setTime(0);
                } catch (e) {
                    alert("Error en el JSON");
                }
            };

            const getAnimatedValue = (element, propName, defaultValue) => {
                const anims = element.animations?.filter(a => a.prop === propName);
                if (!anims || anims.length === 0) return defaultValue;

                let currentValue = anims[0].from;
                for (const anim of anims) {
                    if (time < anim.start) continue;
                    if (time >= anim.end) {
                        currentValue = anim.to;
                        continue;
                    }
                    const progress = (time - anim.start) / (anim.end - anim.start);
                    const easeFn = Easing[anim.ease || 'linear'] || Easing.linear;
                    
                    if (propName.toLowerCase().includes('color')) {
                        currentValue = interpolateColor(anim.from, anim.to, easeFn(progress));
                    } else {
                        currentValue = anim.from + (anim.to - anim.from) * easeFn(progress);
                    }
                }
                return currentValue;
            };

            // MOTOR DE DIBUJO CON SOPORTE PARA FILTROS
            const renderCanvas = (currentTime) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { config, elements } = data;

                ctx.fillStyle = config.background || "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                elements.forEach(el => {
                    ctx.save();
                    
                    const x = getAnimatedValue(el, 'x', el.x || 0);
                    const y = getAnimatedValue(el, 'y', el.y || 0);
                    const scale = getAnimatedValue(el, 'scale', el.scale || 1);
                    const opacity = getAnimatedValue(el, 'opacity', el.opacity !== undefined ? el.opacity : 1);
                    const rot = getAnimatedValue(el, 'rotation', el.rotation || 0);
                    const blur = getAnimatedValue(el, 'blur', el.blur || 0);
                    const grayscale = getAnimatedValue(el, 'grayscale', el.grayscale || 0);
                    const shadowBlur = getAnimatedValue(el, 'shadowBlur', el.shadowBlur || 0);
                    const color = getAnimatedValue(el, 'color', el.color || "#ffffff");

                    ctx.globalAlpha = Math.max(0, Math.min(1, opacity));
                    
                    // Aplicar Filtros CSS nativos
                    let filterStr = "";
                    if (blur > 0) filterStr += `blur(${blur}px) `;
                    if (grayscale > 0) filterStr += `grayscale(${grayscale}%)`;
                    if (filterStr) ctx.filter = filterStr.trim();

                    // Aplicar Efectos de Resplandor
                    if (shadowBlur > 0) {
                        ctx.shadowBlur = shadowBlur;
                        ctx.shadowColor = getAnimatedValue(el, 'shadowColor', el.shadowColor || color);
                    }
                    
                    if (el.type === 'rect') {
                        const w = getAnimatedValue(el, 'width', el.width);
                        const h = getAnimatedValue(el, 'height', el.height);
                        ctx.translate(x, y);
                        ctx.rotate(rot * Math.PI / 180);
                        ctx.scale(scale, scale);
                        ctx.fillStyle = color;
                        if (el.anchor === 'center') {
                            ctx.fillRect(-w/2, -h/2, w, h);
                        } else {
                            ctx.fillRect(0, 0, w, h);
                        }
                    } 
                    else if (el.type === 'circle') {
                        const r = getAnimatedValue(el, 'radius', el.radius);
                        ctx.translate(x, y);
                        ctx.scale(scale, scale);
                        ctx.beginPath();
                        ctx.arc(0, 0, r, 0, Math.PI * 2);
                        ctx.fillStyle = color;
                        ctx.fill();
                    }
                    else if (el.type === 'line') {
                        const x2 = getAnimatedValue(el, 'x2', el.x2);
                        const y2 = getAnimatedValue(el, 'y2', el.y2);
                        
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = color;
                        ctx.lineWidth = el.lineWidth || 5;
                        ctx.stroke();
                    }
                    else if (el.type === 'text') {
                        ctx.translate(x, y);
                        ctx.scale(scale, scale);
                        ctx.fillStyle = color;
                        ctx.font = `bold ${el.fontSize}px sans-serif`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(el.text, 0, 0);
                    }

                    ctx.restore();
                });
            };

            useEffect(() => {
                if (isPlaying && !isExporting) {
                    let lastTime = performance.now();
                    const loop = (now) => {
                        const dt = (now - lastTime) / 1000;
                        lastTime = now;
                        setTime(prev => {
                            const next = prev + dt;
                            return next > data.config.duration ? 0 : next;
                        });
                        animRef.current = requestAnimationFrame(loop);
                    };
                    animRef.current = requestAnimationFrame(loop);
                } else {
                    cancelAnimationFrame(animRef.current);
                }
                return () => cancelAnimationFrame(animRef.current);
            }, [isPlaying, data.config.duration, isExporting]);

            useEffect(() => {
                renderCanvas(time);
            }, [time, data]);

            // SISTEMA DE EXPORTACIÓN INFALIBLE (Desacoplado del reloj real)
            const handleExport = async () => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                setIsPlaying(false);
                setIsExporting(true);
                setTime(0);

                const stream = canvas.captureStream(data.config.fps);
                const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
                const chunks = [];
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `vibe_pro_render_${Date.now()}.webm`;
                    a.click();
                    setIsExporting(false);
                    setTime(0);
                };

                mediaRecorder.start();

                // Matemática estricta de frames para evitar dropped frames o tearing
                const totalFrames = data.config.duration * data.config.fps;
                const timeStep = 1 / data.config.fps;
                let currentFrame = 0;

                const exportLoop = () => {
                    if (currentFrame > totalFrames) {
                        mediaRecorder.stop();
                        return;
                    }
                    
                    const exportTime = currentFrame * timeStep;
                    setTime(exportTime);
                    renderCanvas(exportTime);
                    currentFrame++;
                    
                    // Esperamos al siguiente ciclo de dibujado para asegurar que el canvas se actualizó
                    requestAnimationFrame(exportLoop);
                };

                // Arrancamos el renderizado controlado
                requestAnimationFrame(exportLoop);
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Código JSON */}
                    <div className="w-1/3 bg-slate-900 border-r border-slate-800 flex flex-col z-10 shadow-2xl">
                        <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                            <h2 className="font-bold text-amber-500 text-sm tracking-wider"><i className="fas fa-bolt mr-2"></i>VIBE GRAPHICS PRO</h2>
                            <button onClick={handleSync} className="bg-slate-800 border border-slate-700 hover:bg-slate-700 px-4 py-1.5 text-xs font-bold rounded transition-colors">
                                <i className="fas fa-rotate mr-2"></i>Sincronizar
                            </button>
                        </div>
                        <textarea 
                            value={jsonText} 
                            onChange={(e) => setJsonText(e.target.value)}
                            className="flex-1 bg-slate-900 p-4 text-emerald-400 font-mono text-xs focus:outline-none resize-none leading-relaxed"
                            spellCheck="false"
                        ></textarea>
                    </div>

                    {/* Previsualización */}
                    <div className="w-2/3 flex flex-col bg-slate-950 relative">
                        {isExporting && (
                            <div className="absolute inset-0 bg-black/85 z-50 flex items-center justify-center flex-col backdrop-blur-sm">
                                <i className="fas fa-microchip animate-spin text-5xl text-amber-500 mb-6"></i>
                                <h2 className="text-2xl font-bold tracking-tight">Renderizado Sincronizado</h2>
                                <p className="text-slate-400 mt-2 font-mono text-sm">Calculando partículas y filtros a {data.config.fps} FPS puros</p>
                            </div>
                        )}
                        
                        <div className="flex-1 flex items-center justify-center p-8 overflow-hidden">
                            <div className="relative shadow-2xl shadow-indigo-900/20 border border-slate-800 rounded-lg overflow-hidden bg-black" style={{ height: '80vh', aspectRatio: '9/16' }}>
                                <canvas 
                                    ref={canvasRef} 
                                    width={data.config.width} 
                                    height={data.config.height} 
                                    className="w-full h-full object-contain"
                                ></canvas>
                            </div>
                        </div>

                        {/* Controles de Reproducción y Exportación */}
                        <div className="h-20 bg-slate-900 border-t border-slate-800 px-8 flex items-center justify-between">
                            <div className="flex items-center space-x-4">
                                <button onClick={() => setTime(0)} className="text-slate-400 hover:text-white text-xl transition-colors"><i className="fas fa-backward-step"></i></button>
                                <button onClick={() => setIsPlaying(!isPlaying)} className="w-12 h-12 bg-amber-500 hover:bg-amber-400 rounded-full text-black flex items-center justify-center text-xl shadow-lg transition-transform hover:scale-105">
                                    <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play ml-1'}`}></i>
                                </button>
                                <span className="font-mono text-amber-500 text-sm font-bold bg-slate-950 px-3 py-1.5 rounded-lg border border-slate-800">
                                    {time.toFixed(2)}s / {data.config.duration}s
                                </span>
                            </div>

                            <button onClick={handleExport} className="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-bold px-6 py-3 rounded-lg shadow-lg shadow-emerald-900/40 flex items-center space-x-2 transition-all">
                                <i className="fas fa-download"></i>
                                <span>Exportar Video (Anti-Glitch)</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
