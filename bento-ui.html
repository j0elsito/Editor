<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Studio Pro | Editor de Keyframes & Línea de Tiempo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; margin: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        input[type="range"] { accent-color: #cbfb45; }
        .keyframe-input { background: #020617; border: 1px solid #334155; color: white; padding: 2px 4px; border-radius: 4px; font-size: 11px; width: 100%; }
        .keyframe-input:focus { outline: none; border-color: #cbfb45; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialJSON = {
          "config": { "width": 1080, "height": 1920, "fps": 60, "duration": 5.0, "background": "#0f172a" },
          "elements": [
            {
              "id": "mi_primer_clip", "type": "rect", "x": 540, "y": 960, "width": 400, "height": 400, "borderRadius": 40, "color": "#38bdf8", "anchor": "center",
              "animations": [
                { "prop": "scale", "from": 0, "to": 1, "start": 0.5, "end": 1.5, "ease": "easeOutBounce" },
                { "prop": "rotation", "from": -90, "to": 0, "start": 0.5, "end": 1.5, "ease": "easeOutBounce" }
              ]
            },
            {
              "id": "texto_bienvenida", "type": "text", "text": "¡EDITOR ACTIVO!", "x": 540, "y": 960, "fontSize": 50, "color": "#0f172a",
              "animations": [
                { "prop": "scale", "from": 0, "to": 1, "start": 0.8, "end": 1.8, "ease": "easeOutBounce" }
              ]
            }
          ]
        };

        const Easing = {
            linear: t => t,
            easeOut: t => 1 - Math.pow(1 - t, 3),
            easeInOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
            easeOutBounce: t => {
                const n1 = 7.5625, d1 = 2.75;
                if (t < 1 / d1) return n1 * t * t;
                if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
                if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
                return n1 * (t -= 2.625 / d1) * t + 0.984375;
            }
        };

        const hexToRgb = (hex) => {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
        };

        const interpolateColor = (color1, color2, factor) => {
            const c1 = hexToRgb(color1); const c2 = hexToRgb(color2);
            return `rgb(${Math.round(c1.r + factor * (c2.r - c1.r))}, ${Math.round(c1.g + factor * (c2.g - c1.g))}, ${Math.round(c1.b + factor * (c2.b - c1.b))})`;
        };

        function App() {
            const [data, setData] = useState(initialJSON);
            const [jsonText, setJsonText] = useState(JSON.stringify(initialJSON, null, 2));
            const [time, setTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [playbackSpeed, setPlaybackSpeed] = useState(1.0);
            const [selectedId, setSelectedId] = useState(null);
            const [imagesAssets, setImagesAssets] = useState({});
            
            const canvasRef = useRef(null);
            const animRef = useRef(null);

            const updateDataState = (newData) => {
                setData(newData);
                setJsonText(JSON.stringify(newData, null, 2));
            };

            const loadImages = async (elements) => {
                const loaded = { ...imagesAssets };
                const promises = elements.filter(el => el.type === 'image' && el.src).map(el => {
                    return new Promise((resolve) => {
                        if (loaded[el.id] && loaded[el.id].src === el.src) { resolve(); return; }
                        const img = new Image();
                        img.crossOrigin = "Anonymous";
                        img.onload = () => { loaded[el.id] = img; resolve(); };
                        img.onerror = () => { resolve(); };
                        img.src = el.src;
                    });
                });
                await Promise.all(promises);
                setImagesAssets(loaded);
            };

            useEffect(() => { loadImages(data.elements); }, [data]);

            const getAnimatedValue = (element, propName, defaultValue, currentT) => {
                const anims = element.animations?.filter(a => a.prop === propName);
                if (!anims || anims.length === 0) return defaultValue;

                let currentValue = anims[0].from;
                for (const anim of anims) {
                    if (currentT < anim.start) continue;
                    if (currentT >= anim.end) { currentValue = anim.to; continue; }
                    const progress = (currentT - anim.start) / (anim.end - anim.start);
                    const easeFn = Easing[anim.ease || 'linear'] || Easing.linear;
                    if (propName.toLowerCase().includes('color')) {
                        currentValue = interpolateColor(anim.from, anim.to, easeFn(progress));
                    } else {
                        currentValue = anim.from + (anim.to - anim.from) * easeFn(progress);
                    }
                }
                return currentValue;
            };

            const renderCanvas = (currentT) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = data.config.background || "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                data.elements.forEach(el => {
                    ctx.save();
                    const x = getAnimatedValue(el, 'x', el.x || 0, currentT);
                    const y = getAnimatedValue(el, 'y', el.y || 0, currentT);
                    const scale = getAnimatedValue(el, 'scale', el.scale !== undefined ? el.scale : 1, currentT);
                    const opacity = getAnimatedValue(el, 'opacity', el.opacity !== undefined ? el.opacity : 1, currentT);
                    const rot = getAnimatedValue(el, 'rotation', el.rotation || 0, currentT);
                    const blur = getAnimatedValue(el, 'blur', el.blur || 0, currentT);
                    const shadowBlur = getAnimatedValue(el, 'shadowBlur', el.shadowBlur || 0, currentT);
                    const color = el.type !== 'image' ? getAnimatedValue(el, 'color', el.color || "#ffffff", currentT) : null;

                    ctx.globalAlpha = Math.max(0, Math.min(1, opacity));
                    if (blur > 0) ctx.filter = `blur(${blur}px)`;

                    if (shadowBlur > 0) {
                        ctx.shadowBlur = shadowBlur;
                        ctx.shadowColor = getAnimatedValue(el, 'shadowColor', el.shadowColor || color || "#000000", currentT);
                    }
                    
                    ctx.translate(x, y);
                    ctx.rotate(rot * Math.PI / 180);
                    ctx.scale(scale, scale);

                    if (el.type === 'image' && imagesAssets[el.id]) {
                        const img = imagesAssets[el.id];
                        const w = getAnimatedValue(el, 'width', el.width || img.width, currentT);
                        const h = getAnimatedValue(el, 'height', el.height || img.height, currentT);
                        if (el.anchor === 'center') ctx.drawImage(img, -w/2, -h/2, w, h);
                        else ctx.drawImage(img, 0, 0, w, h);
                    }
                    else if (el.type === 'rect') {
                        const w = getAnimatedValue(el, 'width', el.width, currentT);
                        const h = getAnimatedValue(el, 'height', el.height, currentT);
                        const radius = getAnimatedValue(el, 'borderRadius', el.borderRadius || 0, currentT);
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        if (el.anchor === 'center') {
                            if (radius > 0) ctx.roundRect(-w/2, -h/2, w, h, radius); else ctx.rect(-w/2, -h/2, w, h);
                        } else {
                            if (radius > 0) ctx.roundRect(0, 0, w, h, radius); else ctx.rect(0, 0, w, h);
                        }
                        ctx.fill();
                    } 
                    else if (el.type === 'circle') {
                        const r = getAnimatedValue(el, 'radius', el.radius, currentT);
                        ctx.fillStyle = color;
                        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
                    }
                    else if (el.type === 'text') {
                        ctx.fillStyle = color;
                        ctx.font = `${el.fontWeight || 'bold'} ${el.fontSize}px ${el.fontFamily || 'sans-serif'}`;
                        ctx.textAlign = el.textAlign || "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(el.text, 0, 0);
                    }

                    if (el.id === selectedId && !isExporting) {
                        ctx.strokeStyle = "#cbfb45";
                        ctx.lineWidth = 6 / scale; 
                        ctx.setLineDash([15 / scale, 15 / scale]);
                        const w = el.width || (el.radius ? el.radius * 2 : 200);
                        const h = el.height || (el.radius ? el.radius * 2 : 100);
                        if (el.anchor === 'center' || el.type === 'circle' || el.type === 'text') {
                            ctx.strokeRect(-w/2 - 10, -h/2 - 10, w + 20, h + 20);
                        } else { ctx.strokeRect(-10, -10, w + 20, h + 20); }
                    }
                    ctx.restore();
                });
            };

            useEffect(() => {
                if (isPlaying && !isExporting) {
                    let lastTime = performance.now();
                    const loop = (now) => {
                        const dt = ((now - lastTime) / 1000) * playbackSpeed;
                        lastTime = now;
                        setTime(prev => {
                            const next = prev + dt;
                            return next > data.config.duration ? 0 : next;
                        });
                        animRef.current = requestAnimationFrame(loop);
                    };
                    animRef.current = requestAnimationFrame(loop);
                } else {
                    cancelAnimationFrame(animRef.current);
                }
                return () => cancelAnimationFrame(animRef.current);
            }, [isPlaying, data.config.duration, isExporting, playbackSpeed]);

            useEffect(() => { if (!isExporting) renderCanvas(time); }, [time, data, isExporting, selectedId, imagesAssets]);

            const handleCanvasClick = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clickX = (e.clientX - rect.left) * scaleX;
                const clickY = (e.clientY - rect.top) * scaleY;
                
                let hitId = null;
                for (let i = data.elements.length - 1; i >= 0; i--) {
                    const el = data.elements[i];
                    const x = getAnimatedValue(el, 'x', el.x || 0, time);
                    const y = getAnimatedValue(el, 'y', el.y || 0, time);
                    const w = el.width || (el.radius ? el.radius * 2 : 300);
                    const h = el.height || (el.radius ? el.radius * 2 : 100);
                    let minX = el.anchor === 'center' || el.type === 'circle' || el.type === 'text' ? x - w/2 : x;
                    let minY = el.anchor === 'center' || el.type === 'circle' || el.type === 'text' ? y - h/2 : y;
                    if (clickX >= minX && clickX <= minX + w && clickY >= minY && clickY <= minY + h) { hitId = el.id; break; }
                }
                setSelectedId(hitId);
            };

            const updateElementProperty = (prop, value) => {
                if(!selectedId) return;
                const newElements = data.elements.map(el => el.id === selectedId ? { ...el, [prop]: value } : el);
                updateDataState({ ...data, elements: newElements });
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !selectedId) return;
                const objectUrl = URL.createObjectURL(file);
                const newElements = data.elements.map(el => {
                    if (el.id === selectedId) return { ...el, type: 'image', src: objectUrl, _originalType: el.type !== 'image' ? el.type : (el._originalType || 'rect') };
                    return el;
                });
                updateDataState({ ...data, elements: newElements });
            };

            const handleRemoveImage = () => {
                if(!selectedId) return;
                const newElements = data.elements.map(el => {
                    if (el.id === selectedId) {
                        const { src, _originalType, ...rest } = el;
                        return { ...rest, type: _originalType || 'rect' };
                    }
                    return el;
                });
                updateDataState({ ...data, elements: newElements });
                const newAssets = {...imagesAssets}; delete newAssets[selectedId]; setImagesAssets(newAssets);
            };

            // --- NUEVAS FUNCIONES DE LÍNEA DE TIEMPO Y KEYFRAMES ---
            
            const handleAddElement = (type = 'rect') => {
                const newId = `capa_${Math.floor(Math.random() * 1000)}`;
                const newElement = {
                    id: newId, type: type, x: 540, y: 960, anchor: "center", animations: []
                };
                if(type === 'rect') { newElement.width = 300; newElement.height = 300; newElement.color = "#cbfb45"; newElement.borderRadius = 30; }
                if(type === 'text') { newElement.text = "NUEVO TEXTO"; newElement.fontSize = 60; newElement.color = "#ffffff"; }
                
                updateDataState({ ...data, elements: [...data.elements, newElement] });
                setSelectedId(newId);
            };

            const handleDeleteElement = () => {
                if(!selectedId) return;
                const newElements = data.elements.filter(el => el.id !== selectedId);
                updateDataState({ ...data, elements: newElements });
                setSelectedId(null);
            };

            const handleAddKeyframe = () => {
                if(!selectedId) return;
                const newElements = data.elements.map(el => {
                    if (el.id === selectedId) {
                        const newAnims = [...(el.animations || []), { prop: "y", from: 0, to: 100, start: 0, end: 1, ease: "easeOut" }];
                        return { ...el, animations: newAnims };
                    }
                    return el;
                });
                updateDataState({ ...data, elements: newElements });
            };

            const handleUpdateKeyframe = (index, field, value) => {
                if(!selectedId) return;
                const newElements = data.elements.map(el => {
                    if (el.id === selectedId) {
                        const newAnims = [...el.animations];
                        let finalValue = value;
                        if (['from', 'to', 'start', 'end'].includes(field)) finalValue = parseFloat(value) || 0;
                        newAnims[index] = { ...newAnims[index], [field]: finalValue };
                        return { ...el, animations: newAnims };
                    }
                    return el;
                });
                updateDataState({ ...data, elements: newElements });
            };

            const handleDeleteKeyframe = (index) => {
                if(!selectedId) return;
                const newElements = data.elements.map(el => {
                    if (el.id === selectedId) {
                        const newAnims = el.animations.filter((_, i) => i !== index);
                        return { ...el, animations: newAnims };
                    }
                    return el;
                });
                updateDataState({ ...data, elements: newElements });
            };
            // -----------------------------------------------------

            const handleExport = async () => {
                if (!canvasRef.current) return;
                setSelectedId(null); setIsPlaying(false); setIsExporting(true); setTime(0);
                await new Promise(r => setTimeout(r, 50));

                const stream = canvasRef.current.captureStream(data.config.fps);
                const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
                const chunks = [];
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `render_${Date.now()}.webm`; a.click();
                    setIsExporting(false); setTime(0); renderCanvas(0);
                };

                mediaRecorder.start();
                let startTime = performance.now();
                let exportFrameId;

                const exportLoop = (now) => {
                    const elapsedTime = ((now - startTime) / 1000) * playbackSpeed;
                    if (elapsedTime > data.config.duration) { mediaRecorder.stop(); cancelAnimationFrame(exportFrameId); return; }
                    setTime(elapsedTime); renderCanvas(elapsedTime);
                    exportFrameId = requestAnimationFrame(exportLoop);
                };
                exportFrameId = requestAnimationFrame(exportLoop);
            };

            const handleJsonChange = (e) => {
                setJsonText(e.target.value);
                try { const parsed = JSON.parse(e.target.value); setData(parsed); } catch(err) {}
            };

            const selectedElement = data.elements.find(el => el.id === selectedId);

            return (
                <div className="flex flex-col lg:flex-row h-screen w-full bg-slate-950 overflow-y-auto lg:overflow-hidden">
                    
                    {/* PANEL CENTRAL: CANVAS, REPRODUCTOR Y LÍNEA DE TIEMPO */}
                    <div className="order-1 lg:order-2 w-full lg:flex-1 flex flex-col relative min-h-[60vh] lg:h-full border-b lg:border-b-0 border-slate-800">
                        
                        {/* CANVAS */}
                        <div className="flex-1 flex items-center justify-center p-4 overflow-hidden relative">
                            {isExporting && (
                                <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center flex-col backdrop-blur-md">
                                    <i className="fas fa-compact-disc animate-spin text-4xl text-amber-500 mb-4"></i>
                                    <h2 className="text-xl font-bold">Renderizando...</h2>
                                </div>
                            )}
                            <div className="relative shadow-2xl shadow-indigo-900/10 border border-slate-800 rounded-lg overflow-hidden bg-black h-full max-h-[70vh] aspect-[9/16]">
                                <canvas ref={canvasRef} width={data.config.width} height={data.config.height} onClick={handleCanvasClick} className="w-full h-full object-contain cursor-crosshair"></canvas>
                            </div>
                        </div>

                        {/* REPRODUCTOR */}
                        <div className="bg-slate-900 border-t border-slate-800 px-4 py-3 flex flex-wrap items-center justify-between gap-4 z-10">
                            <div className="flex items-center space-x-3">
                                <button onClick={() => setTime(0)} className="text-slate-400 hover:text-white text-lg"><i className="fas fa-backward-step"></i></button>
                                <button onClick={() => setIsPlaying(!isPlaying)} className="w-10 h-10 bg-amber-500 hover:bg-amber-400 rounded-full text-black flex items-center justify-center text-lg shadow-lg">
                                    <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play ml-1'}`}></i>
                                </button>
                                <span className="font-mono text-amber-500 text-xs font-bold bg-slate-950 px-2 py-1 rounded border border-slate-800">
                                    {time.toFixed(2)}s / {data.config.duration}s
                                </span>
                            </div>
                            <button onClick={handleExport} className="w-full sm:w-auto bg-emerald-500 hover:bg-emerald-400 text-white font-bold px-4 py-2 rounded shadow-lg flex items-center justify-center space-x-2 text-sm">
                                <i className="fas fa-video"></i> <span>Exportar</span>
                            </button>
                        </div>

                        {/* LÍNEA DE TIEMPO / CAPAS (NUEVO) */}
                        <div className="bg-slate-950 h-48 border-t border-slate-800 flex flex-col">
                            <div className="flex justify-between items-center p-2 border-b border-slate-800 bg-slate-900">
                                <span className="text-xs font-bold text-amber-500"><i className="fas fa-layer-group mr-2"></i>LÍNEA DE TIEMPO / CLIPS</span>
                                <div className="space-x-2 flex">
                                    <button onClick={() => handleAddElement('rect')} className="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white text-[10px] px-2 py-1 rounded"><i className="fas fa-square mr-1"></i>+ Forma</button>
                                    <button onClick={() => handleAddElement('text')} className="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white text-[10px] px-2 py-1 rounded"><i className="fas fa-font mr-1"></i>+ Texto</button>
                                    {selectedId && <button onClick={handleDeleteElement} className="bg-red-900 hover:bg-red-800 text-red-200 text-[10px] px-2 py-1 rounded border border-red-800"><i className="fas fa-trash mr-1"></i>Eliminar Capa</button>}
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1">
                                {data.elements.map(el => (
                                    <div key={el.id} onClick={() => setSelectedId(el.id)} className={`flex justify-between items-center p-2 rounded cursor-pointer text-xs border ${selectedId === el.id ? 'bg-slate-800 border-amber-500' : 'bg-slate-900 border-slate-800 hover:bg-slate-800'}`}>
                                        <div className="flex items-center">
                                            <i className={`fas ${el.type === 'image' ? 'fa-image text-emerald-400' : el.type === 'text' ? 'fa-font text-blue-400' : 'fa-square text-purple-400'} mr-3`}></i>
                                            <span className="font-mono text-white truncate max-w-[150px]">{el.id}</span>
                                        </div>
                                        <div className="text-slate-500 font-mono text-[10px]">{el.animations?.length || 0} anims</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* PANEL DERECHO: INSPECTOR Y KEYFRAMES (ACTUALIZADO) */}
                    <div className="order-2 lg:order-3 w-full lg:w-[350px] min-h-[40vh] lg:h-full bg-slate-900 lg:border-l border-slate-800 flex flex-col z-20 overflow-y-auto">
                        <div className="p-4 bg-slate-950 border-b border-slate-800 sticky top-0 z-10 flex justify-between items-center">
                            <h2 className="font-bold text-amber-500 text-sm tracking-wider"><i className="fas fa-sliders mr-2"></i>INSPECTOR</h2>
                        </div>
                        
                        <div className="p-4">
                            {!selectedId ? (
                                <div className="text-center py-10 opacity-50"><p className="text-sm">Selecciona una capa en la línea de tiempo o lienzo.</p></div>
                            ) : (
                                <div className="space-y-4">
                                    <div className="bg-slate-800 text-xs px-2 py-1 rounded inline-block text-emerald-400 mb-2">{selectedElement?.id}</div>

                                    {/* Edición de Textos o Colores */}
                                    {selectedElement?.type === 'text' && (
                                        <div>
                                            <label className="text-xs text-slate-400 mb-1 block">Editar Texto</label>
                                            <input type="text" value={selectedElement.text} onChange={(e) => updateElementProperty('text', e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded px-2 py-2 text-sm text-white outline-none focus:border-amber-500" />
                                        </div>
                                    )}
                                    {selectedElement?.type !== 'image' && (
                                        <div>
                                            <label className="text-xs text-slate-400 mb-1 block">Color Hex</label>
                                            <input type="text" value={selectedElement.color || '#ffffff'} onChange={(e) => updateElementProperty('color', e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-sm text-white outline-none focus:border-amber-500" />
                                        </div>
                                    )}

                                    {/* Carga de PNGs */}
                                    <div className="bg-slate-950 p-3 rounded border border-slate-800">
                                        <label className="flex items-center justify-center w-full h-12 bg-slate-900 border border-slate-700 border-dashed rounded cursor-pointer hover:border-amber-500 mb-2">
                                            <span className="text-slate-400 text-xs"><i className="fas fa-upload mr-2"></i>Subir PNG/JPG</span>
                                            <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                                        </label>
                                        {selectedElement?.type === 'image' && (
                                            <button onClick={handleRemoveImage} className="w-full bg-red-900/40 text-red-300 text-xs py-1 rounded border border-red-800"><i className="fas fa-trash-can mr-2"></i>Borrar Imagen</button>
                                        )}
                                    </div>

                                    {/* Posiciones Básicas */}
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-[10px] text-slate-400">X: {selectedElement?.x}</label>
                                            <input type="range" min="-500" max="1500" value={selectedElement?.x || 0} onChange={(e) => updateElementProperty('x', parseInt(e.target.value))} className="w-full" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] text-slate-400">Y: {selectedElement?.y}</label>
                                            <input type="range" min="-500" max="2500" value={selectedElement?.y || 0} onChange={(e) => updateElementProperty('y', parseInt(e.target.value))} className="w-full" />
                                        </div>
                                        {(selectedElement?.type === 'rect' || selectedElement?.type === 'image') && (
                                            <>
                                                <div><label className="text-[10px] text-slate-400">Ancho</label><input type="number" value={selectedElement?.width || 0} onChange={(e) => updateElementProperty('width', parseInt(e.target.value))} className="w-full bg-slate-950 border border-slate-700 text-white text-xs p-1 rounded" /></div>
                                                <div><label className="text-[10px] text-slate-400">Alto</label><input type="number" value={selectedElement?.height || 0} onChange={(e) => updateElementProperty('height', parseInt(e.target.value))} className="w-full bg-slate-950 border border-slate-700 text-white text-xs p-1 rounded" /></div>
                                            </>
                                        )}
                                    </div>

                                    {/* ANIMACIONES (KEYFRAMES MANAGER) NUEVO */}
                                    <div className="mt-6 border-t border-slate-800 pt-4">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-xs font-bold text-amber-500"><i className="fas fa-film mr-2"></i>KEYFRAMES</span>
                                            <button onClick={handleAddKeyframe} className="text-emerald-400 text-xs hover:text-emerald-300"><i className="fas fa-plus"></i> Añadir</button>
                                        </div>
                                        
                                        <div className="space-y-2">
                                            {selectedElement?.animations?.map((anim, idx) => (
                                                <div key={idx} className="bg-slate-950 p-2 rounded border border-slate-800 relative">
                                                    <button onClick={() => handleDeleteKeyframe(idx)} className="absolute top-1 right-2 text-red-500 hover:text-red-400 text-xs"><i className="fas fa-times"></i></button>
                                                    <div className="grid grid-cols-2 gap-2 mb-2 pr-4">
                                                        <div>
                                                            <label className="text-[9px] text-slate-500">Propiedad</label>
                                                            <select value={anim.prop} onChange={(e) => handleUpdateKeyframe(idx, 'prop', e.target.value)} className="keyframe-input">
                                                                <option value="x">Posición X</option><option value="y">Posición Y</option>
                                                                <option value="scale">Escala</option><option value="rotation">Rotación</option>
                                                                <option value="opacity">Opacidad</option><option value="color">Color</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="text-[9px] text-slate-500">Ease (Suavizado)</label>
                                                            <select value={anim.ease || 'linear'} onChange={(e) => handleUpdateKeyframe(idx, 'ease', e.target.value)} className="keyframe-input">
                                                                <option value="linear">Lineal</option><option value="easeOut">Ease Out</option><option value="easeOutBounce">Rebote</option><option value="easeInOut">Suave Ent/Sal</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-4 gap-1">
                                                        <div><label className="text-[9px] text-slate-500">De</label><input type="text" value={anim.from} onChange={(e) => handleUpdateKeyframe(idx, 'from', e.target.value)} className="keyframe-input" /></div>
                                                        <div><label className="text-[9px] text-slate-500">A</label><input type="text" value={anim.to} onChange={(e) => handleUpdateKeyframe(idx, 'to', e.target.value)} className="keyframe-input" /></div>
                                                        <div><label className="text-[9px] text-slate-500">Inicio (s)</label><input type="number" step="0.1" value={anim.start} onChange={(e) => handleUpdateKeyframe(idx, 'start', e.target.value)} className="keyframe-input text-amber-200" /></div>
                                                        <div><label className="text-[9px] text-slate-500">Fin (s)</label><input type="number" step="0.1" value={anim.end} onChange={(e) => handleUpdateKeyframe(idx, 'end', e.target.value)} className="keyframe-input text-amber-200" /></div>
                                                    </div>
                                                </div>
                                            ))}
                                            {(!selectedElement?.animations || selectedElement.animations.length === 0) && (
                                                <div className="text-center text-[10px] text-slate-500 py-2">Sin animaciones. Elemento estático.</div>
                                            )}
                                        </div>
                                    </div>

                                </div>
                            )}
                        </div>
                    </div>

                    {/* PANEL IZQUIERDO: JSON & VELOCIDAD */}
                    <div className="order-3 lg:order-1 w-full lg:w-1/4 min-h-[40vh] lg:h-full bg-slate-900 lg:border-r border-slate-800 flex flex-col z-20">
                        <div className="p-4 bg-slate-950 border-b border-slate-800 sticky top-0"><h2 className="font-bold text-amber-500 text-sm"><i className="fas fa-code mr-2"></i>CÓDIGO</h2></div>
                        <textarea value={jsonText} onChange={handleJsonChange} className="flex-1 bg-slate-900 p-4 text-emerald-400 font-mono text-[10px] focus:outline-none resize-none" spellCheck="false"></textarea>
                        <div className="p-4 bg-slate-950 border-t border-slate-800">
                            <label className="text-xs font-bold text-slate-400 flex justify-between mb-2"><span>Velocidad Global:</span><span className="text-amber-500">{playbackSpeed.toFixed(1)}x</span></label>
                            <input type="range" min="0.2" max="3.0" step="0.1" value={playbackSpeed} onChange={(e) => setPlaybackSpeed(parseFloat(e.target.value))} className="w-full" />
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
