<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Studio Pro | Timeline & Drag Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #121212; color: #e5e5e5; font-family: 'Inter', system-ui, sans-serif; margin: 0; overflow: hidden; user-select: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        
        /* Tema CapCut / Premiere */
        .panel { background-color: #1e1e1e; border: 1px solid #2d2d2d; }
        .track-bg { background-color: #262626; }
        .track-item { background-color: #3f3f46; border: 1px solid #52525b; }
        .playhead-line { position: absolute; top: 0; bottom: 0; width: 2px; background-color: #3b82f6; z-index: 50; pointer-events: none; }
        .playhead-head { position: absolute; top: 0; transform: translateX(-50%); width: 10px; height: 12px; background-color: #3b82f6; clip-path: polygon(0 0, 100% 0, 100% 60%, 50% 100%, 0 60%); cursor: ew-resize; z-index: 51;}
        
        input[type="range"] { accent-color: #3b82f6; }
        .input-dark { background: #121212; border: 1px solid #3f3f46; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 100%; }
        .input-dark:focus { outline: none; border-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialJSON = {
          "config": { "width": 1080, "height": 1920, "fps": 60, "duration": 6.0, "background": "#000000" },
          "elements": [
            {
              "id": "caja_ejemplo", "type": "rect", "x": 540, "y": 960, "width": 350, "height": 350, "borderRadius": 40, "color": "#3b82f6", "anchor": "center",
              "animations": [
                { "prop": "scale", "from": 0, "to": 1, "start": 0.5, "end": 1.5, "ease": "easeOutBounce" }
              ]
            },
            {
              "id": "texto_titulo", "type": "text", "text": "ARRASTRAME", "x": 540, "y": 960, "fontSize": 50, "color": "#ffffff",
              "animations": [
                { "prop": "opacity", "from": 0, "to": 1, "start": 1.0, "end": 2.0, "ease": "linear" }
              ]
            }
          ]
        };

        const Easing = {
            linear: t => t,
            easeOut: t => 1 - Math.pow(1 - t, 3),
            easeInOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
            easeOutBounce: t => {
                const n1 = 7.5625, d1 = 2.75;
                if (t < 1 / d1) return n1 * t * t;
                if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
                if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
                return n1 * (t -= 2.625 / d1) * t + 0.984375;
            }
        };

        function App() {
            const [data, setData] = useState(initialJSON);
            const [time, setTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [selectedId, setSelectedId] = useState(null);
            const [imagesAssets, setImagesAssets] = useState({});
            
            // Estados para DRAG & DROP en Canvas
            const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

            const canvasRef = useRef(null);
            const animRef = useRef(null);
            const timelineRef = useRef(null);

            // --- CARGA DE IMÁGENES ---
            const loadImages = async (elements) => {
                const loaded = { ...imagesAssets };
                const promises = elements.filter(el => el.type === 'image' && el.src).map(el => {
                    return new Promise((resolve) => {
                        if (loaded[el.id] && loaded[el.id].src === el.src) { resolve(); return; }
                        const img = new Image();
                        img.crossOrigin = "Anonymous";
                        img.onload = () => { loaded[el.id] = img; resolve(); };
                        img.onerror = () => { resolve(); };
                        img.src = el.src;
                    });
                });
                await Promise.all(promises);
                setImagesAssets(loaded);
            };
            useEffect(() => { loadImages(data.elements); }, [data]);

            // --- MOTOR DE ANIMACIÓN ---
            const getAnimatedValue = (element, propName, defaultValue, currentT) => {
                const anims = element.animations?.filter(a => a.prop === propName);
                if (!anims || anims.length === 0) return defaultValue;

                let currentValue = anims[0].from;
                for (const anim of anims) {
                    if (currentT < anim.start) continue;
                    if (currentT >= anim.end) { currentValue = anim.to; continue; }
                    const progress = (currentT - anim.start) / (anim.end - anim.start);
                    const easeFn = Easing[anim.ease || 'linear'] || Easing.linear;
                    if (propName.toLowerCase().includes('color')) return defaultValue; // Simplificado para color
                    currentValue = anim.from + (anim.to - anim.from) * easeFn(progress);
                }
                return currentValue;
            };

            const renderCanvas = (currentT) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = data.config.background || "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                data.elements.forEach(el => {
                    ctx.save();
                    const x = getAnimatedValue(el, 'x', el.x || 0, currentT);
                    const y = getAnimatedValue(el, 'y', el.y || 0, currentT);
                    const scale = getAnimatedValue(el, 'scale', el.scale !== undefined ? el.scale : 1, currentT);
                    const opacity = getAnimatedValue(el, 'opacity', el.opacity !== undefined ? el.opacity : 1, currentT);
                    const rot = getAnimatedValue(el, 'rotation', el.rotation || 0, currentT);
                    const blur = getAnimatedValue(el, 'blur', el.blur || 0, currentT);
                    const color = el.color || "#ffffff";

                    ctx.globalAlpha = Math.max(0, Math.min(1, opacity));
                    if (blur > 0) ctx.filter = `blur(${blur}px)`;
                    
                    ctx.translate(x, y);
                    ctx.rotate(rot * Math.PI / 180);
                    ctx.scale(scale, scale);

                    if (el.type === 'image' && imagesAssets[el.id]) {
                        const img = imagesAssets[el.id];
                        const w = el.width || img.width;
                        const h = el.height || img.height;
                        if (el.anchor === 'center') ctx.drawImage(img, -w/2, -h/2, w, h);
                        else ctx.drawImage(img, 0, 0, w, h);
                    }
                    else if (el.type === 'rect') {
                        const w = el.width || 100; const h = el.height || 100;
                        const radius = el.borderRadius || 0;
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        if (el.anchor === 'center') {
                            if (radius > 0) ctx.roundRect(-w/2, -h/2, w, h, radius); else ctx.rect(-w/2, -h/2, w, h);
                        } else {
                            if (radius > 0) ctx.roundRect(0, 0, w, h, radius); else ctx.rect(0, 0, w, h);
                        }
                        ctx.fill();
                    } 
                    else if (el.type === 'text') {
                        ctx.fillStyle = color;
                        ctx.font = `bold ${el.fontSize}px sans-serif`;
                        ctx.textAlign = "center"; ctx.textBaseline = "middle";
                        ctx.fillText(el.text, 0, 0);
                    }

                    // CAJA DE SELECCIÓN ESTILO PREMIERE
                    if (el.id === selectedId && !isExporting) {
                        ctx.strokeStyle = "#3b82f6";
                        ctx.lineWidth = 4 / scale; 
                        const w = el.width || 200; const h = el.height || 100;
                        const offset = el.anchor === 'center' || el.type === 'text' ? {x: -w/2, y: -h/2} : {x: 0, y: 0};
                        
                        ctx.strokeRect(offset.x - 5, offset.y - 5, w + 10, h + 10);
                        
                        // Puntos de control (esquinas)
                        ctx.fillStyle = "#ffffff";
                        const dotSize = 12 / scale;
                        const drawDot = (dx, dy) => ctx.fillRect(dx - dotSize/2, dy - dotSize/2, dotSize, dotSize);
                        drawDot(offset.x - 5, offset.y - 5);
                        drawDot(offset.x + w + 5, offset.y - 5);
                        drawDot(offset.x - 5, offset.y + h + 5);
                        drawDot(offset.x + w + 5, offset.y + h + 5);
                    }
                    ctx.restore();
                });
            };

            // --- BUCLE DE REPRODUCCIÓN ---
            useEffect(() => {
                if (isPlaying && !isExporting) {
                    let lastTime = performance.now();
                    const loop = (now) => {
                        const dt = (now - lastTime) / 1000;
                        lastTime = now;
                        setTime(prev => {
                            const next = prev + dt;
                            if (next >= data.config.duration) { setIsPlaying(false); return 0; }
                            return next;
                        });
                        animRef.current = requestAnimationFrame(loop);
                    };
                    animRef.current = requestAnimationFrame(loop);
                } else {
                    cancelAnimationFrame(animRef.current);
                }
                return () => cancelAnimationFrame(animRef.current);
            }, [isPlaying, data.config.duration, isExporting]);

            useEffect(() => { if (!isExporting) renderCanvas(time); }, [time, data, isExporting, selectedId, imagesAssets]);


            // --- DRAG AND DROP EN CANVAS ---
            const getCanvasMousePos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                return {
                    x: (e.clientX || e.touches?.[0].clientX) - rect.left,
                    y: (e.clientY || e.touches?.[0].clientY) - rect.top,
                    scaleX, scaleY
                };
            };

            const handleCanvasMouseDown = (e) => {
                const { x: rawX, y: rawY, scaleX, scaleY } = getCanvasMousePos(e);
                const clickX = rawX * scaleX;
                const clickY = rawY * scaleY;
                
                let hitId = null;
                for (let i = data.elements.length - 1; i >= 0; i--) {
                    const el = data.elements[i];
                    const elX = getAnimatedValue(el, 'x', el.x || 0, time);
                    const elY = getAnimatedValue(el, 'y', el.y || 0, time);
                    const w = el.width || 300; const h = el.height || 100;
                    
                    let minX = el.anchor === 'center' || el.type === 'text' ? elX - w/2 : elX;
                    let minY = el.anchor === 'center' || el.type === 'text' ? elY - h/2 : elY;

                    if (clickX >= minX && clickX <= minX + w && clickY >= minY && clickY <= minY + h) {
                        hitId = el.id;
                        setDragOffset({ x: clickX - (el.x || 0), y: clickY - (el.y || 0) });
                        break;
                    }
                }
                
                setSelectedId(hitId);
                if (hitId) setIsDraggingCanvas(true);
            };

            const handleCanvasMouseMove = (e) => {
                if (!isDraggingCanvas || !selectedId) return;
                const { x: rawX, y: rawY, scaleX, scaleY } = getCanvasMousePos(e);
                const currentMouseX = rawX * scaleX;
                const currentMouseY = rawY * scaleY;

                const newX = currentMouseX - dragOffset.x;
                const newY = currentMouseY - dragOffset.y;

                // Actualiza la posición BASE del elemento
                const newElements = data.elements.map(el => 
                    el.id === selectedId ? { ...el, x: Math.round(newX), y: Math.round(newY) } : el
                );
                setData({ ...data, elements: newElements });
            };

            const handleCanvasMouseUp = () => setIsDraggingCanvas(false);

            // --- SCRUBBING EN TIMELINE (Mover el tiempo) ---
            const handleTimelineClick = (e) => {
                if (!timelineRef.current) return;
                const rect = timelineRef.current.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const percentage = Math.max(0, Math.min(1, clickX / rect.width));
                setTime(percentage * data.config.duration);
            };

            const handleTimelineDrag = (e) => {
                if (e.buttons !== 1) return; // Solo si el click izq está presionado
                handleTimelineClick(e);
            };

            // --- FUNCIONES DE EDICIÓN ---
            const updateElementProperty = (prop, value) => {
                if(!selectedId) return;
                const newElements = data.elements.map(el => el.id === selectedId ? { ...el, [prop]: value } : el);
                setData({ ...data, elements: newElements });
            };

            const handleAddElement = (type) => {
                const newId = `Capa_${data.elements.length + 1}`;
                const newElement = { id: newId, type: type, x: 540, y: 960, anchor: "center", animations: [] };
                if(type === 'rect') { newElement.width = 250; newElement.height = 250; newElement.color = "#cbfb45"; }
                if(type === 'text') { newElement.text = "NUEVO TEXTO"; newElement.fontSize = 60; newElement.color = "#ffffff"; }
                setData({ ...data, elements: [...data.elements, newElement] });
                setSelectedId(newId);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !selectedId) return;
                const objectUrl = URL.createObjectURL(file);
                const newElements = data.elements.map(el => {
                    if (el.id === selectedId) return { ...el, type: 'image', src: objectUrl, width: 300, height: 300 };
                    return el;
                });
                setData({ ...data, elements: newElements });
            };

            const handleAddKeyframe = () => {
                if(!selectedId) return;
                const el = data.elements.find(e => e.id === selectedId);
                const newAnims = [...(el.animations || []), { prop: "x", from: el.x, to: el.x + 200, start: time, end: Math.min(time + 1, data.config.duration), ease: "easeOut" }];
                updateElementProperty('animations', newAnims);
            };

            const selectedElement = data.elements.find(el => el.id === selectedId);

            return (
                <div className="flex flex-col h-screen w-full bg-[#121212]">
                    
                    {/* ZONA SUPERIOR: MONITOR Y PROPIEDADES */}
                    <div className="flex flex-1 h-[60%] border-b border-[#2d2d2d]">
                        
                        {/* CANVAS PREVIEW (Estilo Monitor Premiere) */}
                        <div className="flex-1 flex flex-col panel">
                            <div className="h-10 bg-[#1a1a1a] border-b border-[#2d2d2d] flex items-center px-4">
                                <span className="text-xs font-bold text-gray-400">Monitor de Programa</span>
                                <span className="ml-auto font-mono text-xs text-blue-400">{time.toFixed(2)} / {data.config.duration.toFixed(2)}</span>
                            </div>
                            
                            <div className="flex-1 flex items-center justify-center p-4 overflow-hidden relative bg-black/50 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PHJlY3Qgd2lkdGg9IjEwIiBoZWlnaHQ9IjEwIiBmaWxsPSIjMjIyIi8+PHJlY3QgeD0iMTAiIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0iIzExMSIvPjxyZWN0IHk9IjEwIiB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiMxMTEiLz48cmVjdCB4PSIxMCIgeT0iMTAiIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0iIzIyMiIvPjwvc3ZnPg==')]">
                                <div className="relative shadow-2xl border border-[#3f3f46] h-full max-h-[100%] aspect-[9/16]">
                                    <canvas 
                                        ref={canvasRef} 
                                        width={data.config.width} height={data.config.height} 
                                        onMouseDown={handleCanvasMouseDown}
                                        onMouseMove={handleCanvasMouseMove}
                                        onMouseUp={handleCanvasMouseUp}
                                        onMouseLeave={handleCanvasMouseUp}
                                        onTouchStart={handleCanvasMouseDown}
                                        onTouchMove={handleCanvasMouseMove}
                                        onTouchEnd={handleCanvasMouseUp}
                                        className={`w-full h-full object-contain ${isDraggingCanvas ? 'cursor-grabbing' : 'cursor-grab'}`}
                                    ></canvas>
                                </div>
                            </div>

                            {/* CONTROLES DE REPRODUCCIÓN */}
                            <div className="h-12 bg-[#1a1a1a] border-t border-[#2d2d2d] flex items-center justify-center space-x-4">
                                <button onClick={() => setTime(0)} className="text-gray-400 hover:text-white px-2"><i className="fas fa-backward-step"></i></button>
                                <button onClick={() => setIsPlaying(!isPlaying)} className="w-8 h-8 bg-blue-600 hover:bg-blue-500 rounded text-white flex items-center justify-center shadow-lg">
                                    <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play ml-0.5'}`}></i>
                                </button>
                                <button className="text-gray-400 hover:text-white px-2"><i className="fas fa-forward-step"></i></button>
                            </div>
                        </div>

                        {/* INSPECTOR DE PROPIEDADES (Lado Derecho) */}
                        <div className="w-[320px] panel flex flex-col border-l-0">
                            <div className="h-10 bg-[#1a1a1a] border-b border-[#2d2d2d] flex items-center px-4">
                                <span className="text-xs font-bold text-gray-400">Controles de Efectos</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 space-y-5">
                                {!selectedElement ? (
                                    <p className="text-xs text-gray-500 text-center mt-10">Selecciona un clip en el monitor o la línea de tiempo.</p>
                                ) : (
                                    <>
                                        {/* INFO DEL CLIP */}
                                        <div className="flex items-center space-x-2">
                                            <i className={`fas ${selectedElement.type === 'text' ? 'fa-font text-blue-400' : selectedElement.type === 'image' ? 'fa-image text-emerald-400' : 'fa-square text-purple-400'}`}></i>
                                            <span className="text-sm font-bold truncate">{selectedElement.id}</span>
                                        </div>

                                        {/* CONTROLES DE IMAGEN / TEXTO */}
                                        {selectedElement.type === 'text' && (
                                            <div>
                                                <label className="text-[10px] text-gray-400 uppercase tracking-wider mb-1 block">Texto</label>
                                                <input type="text" value={selectedElement.text} onChange={(e) => updateElementProperty('text', e.target.value)} className="input-dark" />
                                            </div>
                                        )}
                                        
                                        <div className="p-3 bg-[#18181b] rounded border border-[#2d2d2d]">
                                            <label className="text-[10px] text-gray-400 uppercase tracking-wider mb-2 block">Reemplazar Visual</label>
                                            <label className="flex items-center justify-center w-full py-1.5 bg-[#27272a] hover:bg-[#3f3f46] border border-[#52525b] rounded cursor-pointer transition">
                                                <span className="text-xs text-white"><i className="fas fa-upload mr-2"></i>Subir Archivo Local</span>
                                                <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                                            </label>
                                        </div>

                                        {/* TRANSFORMACIÓN (POSICIÓN, ESCALA) */}
                                        <div>
                                            <label className="text-[10px] text-gray-400 uppercase tracking-wider mb-2 block border-b border-[#2d2d2d] pb-1">Movimiento</label>
                                            <div className="grid grid-cols-2 gap-3 mt-2">
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] text-gray-500 mb-1">Posición X</span>
                                                    <input type="number" value={Math.round(selectedElement.x)} onChange={e => updateElementProperty('x', parseInt(e.target.value))} className="input-dark" />
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] text-gray-500 mb-1">Posición Y</span>
                                                    <input type="number" value={Math.round(selectedElement.y)} onChange={e => updateElementProperty('y', parseInt(e.target.value))} className="input-dark" />
                                                </div>
                                            </div>
                                            {(selectedElement.type === 'rect' || selectedElement.type === 'image') && (
                                                <div className="grid grid-cols-2 gap-3 mt-3">
                                                    <div className="flex flex-col"><span className="text-[10px] text-gray-500 mb-1">Ancho</span><input type="number" value={selectedElement.width || 0} onChange={e => updateElementProperty('width', parseInt(e.target.value))} className="input-dark" /></div>
                                                    <div className="flex flex-col"><span className="text-[10px] text-gray-500 mb-1">Alto</span><input type="number" value={selectedElement.height || 0} onChange={e => updateElementProperty('height', parseInt(e.target.value))} className="input-dark" /></div>
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* ZONA INFERIOR: LÍNEA DE TIEMPO ESTILO CAPCUT */}
                    <div className="h-[40%] panel flex flex-col border-t-0 border-l-0 border-r-0">
                        {/* TOOLBAR TIMELINE */}
                        <div className="h-10 bg-[#1a1a1a] border-b border-[#2d2d2d] flex items-center px-4 justify-between">
                            <div className="flex space-x-2">
                                <button onClick={() => handleAddElement('rect')} className="bg-[#27272a] hover:bg-[#3f3f46] text-gray-300 text-[11px] px-3 py-1 rounded border border-[#3f3f46] transition"><i className="fas fa-plus mr-1 text-purple-400"></i>Forma</button>
                                <button onClick={() => handleAddElement('text')} className="bg-[#27272a] hover:bg-[#3f3f46] text-gray-300 text-[11px] px-3 py-1 rounded border border-[#3f3f46] transition"><i className="fas fa-plus mr-1 text-blue-400"></i>Texto</button>
                            </div>
                            <button className="bg-blue-600 hover:bg-blue-500 text-white font-bold text-[11px] px-4 py-1 rounded flex items-center"><i className="fas fa-share-from-square mr-2"></i>Exportar Video</button>
                        </div>

                        <div className="flex flex-1 overflow-hidden relative">
                            {/* COLUMNA IZQ: NOMBRES DE PISTAS */}
                            <div className="w-[180px] bg-[#1a1a1a] border-r border-[#2d2d2d] overflow-y-auto hidden md:block">
                                <div className="h-6 border-b border-[#2d2d2d]"></div> {/* Header filler */}
                                {data.elements.map(el => (
                                    <div key={`title-${el.id}`} className={`h-12 border-b border-[#2d2d2d] flex items-center px-2 cursor-pointer ${selectedId === el.id ? 'bg-[#27272a]' : ''}`} onClick={() => setSelectedId(el.id)}>
                                        <i className={`fas ${el.type === 'text' ? 'fa-font text-blue-400' : el.type === 'image' ? 'fa-image text-emerald-400' : 'fa-square text-purple-400'} text-[10px] w-4`}></i>
                                        <span className="text-[11px] truncate">{el.id}</span>
                                    </div>
                                ))}
                            </div>

                            {/* PISTAS DE TIEMPO */}
                            <div className="flex-1 bg-[#121212] overflow-auto relative">
                                {/* REGLA DE TIEMPO TOP */}
                                <div className="h-6 border-b border-[#2d2d2d] bg-[#1a1a1a] relative cursor-text" ref={timelineRef} onMouseDown={handleTimelineClick} onMouseMove={handleTimelineDrag}>
                                    {/* Playhead Vertical */}
                                    <div className="playhead-line" style={{ left: `${(time / data.config.duration) * 100}%` }}>
                                        <div className="playhead-head"></div>
                                    </div>
                                    {/* Marcadores de segundos */}
                                    {[...Array(Math.ceil(data.config.duration) + 1)].map((_, i) => (
                                        <div key={i} className="absolute text-[9px] text-gray-500 top-1" style={{ left: `${(i / data.config.duration) * 100}%` }}>
                                            <div className="w-[1px] h-1.5 bg-[#3f3f46] mx-auto mb-0.5"></div>
                                            {i}s
                                        </div>
                                    ))}
                                </div>

                                {/* CONTENEDOR DE PISTAS */}
                                <div className="relative min-w-full">
                                    {data.elements.map(el => (
                                        <div key={`track-${el.id}`} onClick={() => setSelectedId(el.id)} className={`h-12 border-b border-[#2d2d2d] track-bg relative ${selectedId === el.id ? 'bg-[#18181b]' : ''}`}>
                                            
                                            {/* BLOQUE DEL CLIP (Simulado al 100% de duración por ahora) */}
                                            <div className={`absolute top-2 h-8 rounded text-[10px] pl-2 flex items-center overflow-hidden border ${selectedId === el.id ? 'border-white bg-[#27272a]' : 'border-[#3f3f46] bg-[#1e1e1e]'}`} style={{ left: '0%', width: '100%' }}>
                                                <span className="truncate md:hidden mr-2">{el.id}</span> {/* Nombre para móviles */}
                                                
                                                {/* DIBUJO DE KEYFRAMES (Diamantes) */}
                                                {el.animations?.map((anim, idx) => {
                                                    const leftPercent = (anim.start / data.config.duration) * 100;
                                                    const rightPercent = (anim.end / data.config.duration) * 100;
                                                    return (
                                                        <React.Fragment key={idx}>
                                                            {/* Diamante Start */}
                                                            <div className="absolute top-1/2 -translate-y-1/2 -ml-1 text-[#cbfb45] text-[12px] cursor-pointer" style={{ left: `${leftPercent}%` }} title={`Keyframe: ${anim.prop}`}>♦</div>
                                                            {/* Línea conectora */}
                                                            <div className="absolute top-1/2 -translate-y-1/2 h-[1px] bg-white/20 pointer-events-none" style={{ left: `${leftPercent}%`, width: `${rightPercent - leftPercent}%` }}></div>
                                                            {/* Diamante End */}
                                                            <div className="absolute top-1/2 -translate-y-1/2 -ml-1 text-[#cbfb45] text-[12px] cursor-pointer" style={{ left: `${rightPercent}%` }} title={`Keyframe: ${anim.prop}`}>♦</div>
                                                        </React.Fragment>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
