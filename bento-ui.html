<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Graphics Engine 🎨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; margin: 0; font-family: monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // JSON de Ejemplo: Un auto en el desierto con animaciones matemáticas reales
        const initialJSON = {
          "config": {
            "width": 1080,
            "height": 1920,
            "fps": 60,
            "duration": 4.0,
            "background": "#fb923c" 
          },
          "elements": [
            {
              "id": "sol", "type": "circle", "x": 540, "y": 1200, "radius": 200, "color": "#fef08a",
              "animations": [
                { "prop": "y", "from": 1200, "to": 400, "start": 0, "end": 2.5, "ease": "easeOut" },
                { "prop": "scale", "from": 0, "to": 1, "start": 0, "end": 2, "ease": "easeOutBounce" }
              ]
            },
            {
              "id": "carretera", "type": "rect", "x": 0, "y": 1400, "width": 1080, "height": 520, "color": "#292524",
              "animations": []
            },
            {
              "id": "linea_central", "type": "line", "x1": 540, "y1": 1400, "x2": 540, "y2": 1920, "color": "#facc15", "lineWidth": 15, "dashed": true,
              "animations": [
                { "prop": "dashOffset", "from": 0, "to": -1000, "start": 0, "end": 4.0, "ease": "linear" }
              ]
            },
            {
              "id": "auto", "type": "rect", "x": 540, "y": 2100, "width": 160, "height": 300, "color": "#ef4444", "anchor": "center",
              "animations": [
                { "prop": "y", "from": 2100, "to": 1650, "start": 1.0, "end": 2.5, "ease": "easeOut" },
                { "prop": "x", "from": 540, "to": 450, "start": 2.5, "end": 3.5, "ease": "easeInOut" }
              ]
            },
            {
              "id": "texto", "type": "text", "text": "DESIERTO", "x": 540, "y": 250, "fontSize": 120, "color": "white",
              "animations": [
                { "prop": "opacity", "from": 0, "to": 1, "start": 1.5, "end": 2.5, "ease": "linear" },
                { "prop": "y", "from": 300, "to": 250, "start": 1.5, "end": 2.5, "ease": "easeOut" }
              ]
            }
          ]
        };

        // Funciones Matemáticas de Aceleración (Easing)
        const Easing = {
            linear: t => t,
            easeOut: t => 1 - Math.pow(1 - t, 3),
            easeInOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
            easeOutBounce: t => {
                const n1 = 7.5625, d1 = 2.75;
                if (t < 1 / d1) return n1 * t * t;
                if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
                if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
                return n1 * (t -= 2.625 / d1) * t + 0.984375;
            }
        };

        function App() {
            const [jsonText, setJsonText] = useState(JSON.stringify(initialJSON, null, 2));
            const [data, setData] = useState(initialJSON);
            const [time, setTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const canvasRef = useRef(null);
            const animRef = useRef(null);

            const handleSync = () => {
                try {
                    setData(JSON.parse(jsonText));
                    setTime(0);
                } catch (e) {
                    alert("Error en el JSON");
                }
            };

            // Interpolador: Calcula el valor exacto de una propiedad en un milisegundo dado
            const getAnimatedValue = (element, propName, defaultValue) => {
                const anims = element.animations?.filter(a => a.prop === propName);
                if (!anims || anims.length === 0) return defaultValue;

                let currentValue = anims[0].from;
                for (const anim of anims) {
                    if (time < anim.start) continue;
                    if (time >= anim.end) {
                        currentValue = anim.to;
                        continue;
                    }
                    const progress = (time - anim.start) / (anim.end - anim.start);
                    const easeFn = Easing[anim.ease || 'linear'] || Easing.linear;
                    currentValue = anim.from + (anim.to - anim.from) * easeFn(progress);
                }
                return currentValue;
            };

            // MOTOR DE DIBUJO PURO
            const renderCanvas = (currentTime) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { config, elements } = data;

                // 1. Limpiar y pintar fondo
                ctx.fillStyle = config.background || "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 2. Dibujar capa por capa
                elements.forEach(el => {
                    ctx.save();
                    
                    // Propiedades base animables
                    const x = getAnimatedValue(el, 'x', el.x || 0);
                    const y = getAnimatedValue(el, 'y', el.y || 0);
                    const scale = getAnimatedValue(el, 'scale', el.scale || 1);
                    const opacity = getAnimatedValue(el, 'opacity', el.opacity !== undefined ? el.opacity : 1);
                    const rot = getAnimatedValue(el, 'rotation', el.rotation || 0);

                    ctx.globalAlpha = Math.max(0, Math.min(1, opacity));
                    
                    if (el.type === 'rect') {
                        const w = getAnimatedValue(el, 'width', el.width);
                        const h = getAnimatedValue(el, 'height', el.height);
                        ctx.translate(x, y);
                        ctx.rotate(rot * Math.PI / 180);
                        ctx.scale(scale, scale);
                        ctx.fillStyle = el.color;
                        if (el.anchor === 'center') {
                            ctx.fillRect(-w/2, -h/2, w, h);
                        } else {
                            ctx.fillRect(0, 0, w, h); // Anchor top-left por defecto
                        }
                    } 
                    else if (el.type === 'circle') {
                        const r = getAnimatedValue(el, 'radius', el.radius);
                        ctx.translate(x, y);
                        ctx.scale(scale, scale);
                        ctx.beginPath();
                        ctx.arc(0, 0, r, 0, Math.PI * 2);
                        ctx.fillStyle = el.color;
                        ctx.fill();
                    }
                    else if (el.type === 'line') {
                        const x2 = getAnimatedValue(el, 'x2', el.x2);
                        const y2 = getAnimatedValue(el, 'y2', el.y2);
                        const dashOffset = getAnimatedValue(el, 'dashOffset', 0);
                        
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = el.color;
                        ctx.lineWidth = el.lineWidth || 5;
                        if (el.dashed) {
                            ctx.setLineDash([60, 60]); // Tamaño de las líneas del desierto
                            ctx.lineDashOffset = dashOffset;
                        }
                        ctx.stroke();
                    }
                    else if (el.type === 'text') {
                        ctx.translate(x, y);
                        ctx.scale(scale, scale);
                        ctx.fillStyle = el.color;
                        ctx.font = `bold ${el.fontSize}px sans-serif`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(el.text, 0, 0);
                    }

                    ctx.restore();
                });
            };

            // Bucle de reproducción
            useEffect(() => {
                if (isPlaying && !isExporting) {
                    let lastTime = performance.now();
                    const loop = (now) => {
                        const dt = (now - lastTime) / 1000;
                        lastTime = now;
                        setTime(prev => {
                            const next = prev + dt;
                            return next > data.config.duration ? 0 : next;
                        });
                        animRef.current = requestAnimationFrame(loop);
                    };
                    animRef.current = requestAnimationFrame(loop);
                } else {
                    cancelAnimationFrame(animRef.current);
                }
                return () => cancelAnimationFrame(animRef.current);
            }, [isPlaying, data.config.duration, isExporting]);

            // Redibujar siempre que cambie el tiempo
            useEffect(() => {
                renderCanvas(time);
            }, [time, data]);

            // SISTEMA DE EXPORTACIÓN NATIVO INFALIBLE (No usa grabación de pantalla)
            const handleExport = async () => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                setIsPlaying(false);
                setIsExporting(true);
                setTime(0);

                // Captura el stream directamente del Canvas a 60 FPS (Funciona en local file://)
                const stream = canvas.captureStream(data.config.fps);
                const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 8000000 });
                const chunks = [];
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `vibe_graphic_${Date.now()}.webm`;
                    a.click();
                    setIsExporting(false);
                };

                mediaRecorder.start();

                // Renderizamos frame a frame forzado para asegurar 0% de lag en el video final
                const totalFrames = data.config.duration * data.config.fps;
                const timeStep = 1 / data.config.fps;
                let currentFrame = 0;

                const exportLoop = setInterval(() => {
                    if (currentFrame > totalFrames) {
                        clearInterval(exportLoop);
                        mediaRecorder.stop();
                    } else {
                        const exportTime = currentFrame * timeStep;
                        setTime(exportTime);
                        renderCanvas(exportTime);
                        currentFrame++;
                    }
                }, 1000 / data.config.fps); // Velocidad de grabación en tiempo real
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Código JSON */}
                    <div className="w-1/3 bg-slate-900 border-r border-slate-800 flex flex-col">
                        <div className="p-4 border-b border-slate-800 flex justify-between items-center">
                            <h2 className="font-bold text-amber-500">VIBE GRAPHICS ENGINE</h2>
                            <button onClick={handleSync} className="bg-slate-800 hover:bg-slate-700 px-3 py-1 text-xs font-bold rounded">
                                <i className="fas fa-play mr-2"></i>Aplicar
                            </button>
                        </div>
                        <textarea 
                            value={jsonText} 
                            onChange={(e) => setJsonText(e.target.value)}
                            className="flex-1 bg-slate-950 p-4 text-emerald-400 font-mono text-xs focus:outline-none resize-none"
                            spellCheck="false"
                        ></textarea>
                    </div>

                    {/* Previsualización */}
                    <div className="w-2/3 flex flex-col bg-[#020617] relative">
                        {isExporting && (
                            <div className="absolute inset-0 bg-black/80 z-50 flex items-center justify-center flex-col">
                                <i className="fas fa-circle-notch animate-spin text-4xl text-amber-500 mb-4"></i>
                                <h2 className="text-xl font-bold">Renderizando...</h2>
                                <p className="text-slate-400">Capturando el Canvas directamente</p>
                            </div>
                        )}
                        
                        <div className="flex-1 flex items-center justify-center p-8 overflow-hidden">
                            {/* El Canvas Vectorial Real */}
                            <div className="relative shadow-2xl border border-slate-800 rounded-lg overflow-hidden bg-black" style={{ height: '80vh', aspectRatio: '9/16' }}>
                                <canvas 
                                    ref={canvasRef} 
                                    width={data.config.width} 
                                    height={data.config.height} 
                                    className="w-full h-full object-contain"
                                ></canvas>
                            </div>
                        </div>

                        {/* Controles de Reproducción y Exportación */}
                        <div className="h-20 bg-slate-900 border-t border-slate-800 px-8 flex items-center justify-between">
                            <div className="flex items-center space-x-4">
                                <button onClick={() => setTime(0)} className="text-slate-400 hover:text-white text-xl"><i className="fas fa-backward-step"></i></button>
                                <button onClick={() => setIsPlaying(!isPlaying)} className="w-12 h-12 bg-amber-500 hover:bg-amber-400 rounded-full text-black flex items-center justify-center text-xl">
                                    <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play'}`}></i>
                                </button>
                                <span className="font-mono text-amber-500 text-lg">{time.toFixed(2)}s / {data.config.duration}s</span>
                            </div>

                            <button onClick={handleExport} className="bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-400 hover:to-rose-500 text-white font-bold px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2">
                                <i className="fas fa-download"></i>
                                <span>Exportar Video Directo</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
