            },

              "animations": [
                { "prop": "x", "from": 1200, "to": 620, "start": 1.8, "end": 2.6, "ease": "easeOutBounce" },
                { "prop": "rotation", "from": 360, "to": 0, "start": 1.8, "end": 2.6, "ease": "easeOut" },
                { "prop": "grayscale", "from": 100, "to": 0, "start": 3.8, "end": 4.2, "ease": "linear" },
                { "prop": "color", "from": "#334155", "to": "#3b82f6", "start": 3.8, "end": 4.2, "ease": "linear" },
                { "prop": "shadowBlur", "from": 0, "to": 60, "start": 3.8, "end": 4.2, "ease": "easeOutBounce" },
                { "prop": "shadowColor", "from": "#3b82f6", "to": "#3b82f6", "start": 3.8, "end": 4.2, "ease": "linear" }
              ]
            },
            {
              "id": "bateria_litio",
              "type": "rect",
              "x": 540,
              "y": 1150,
              "width": 360,
              "height": 480,
              "color": "#475569",
              "anchor": "center",
              "grayscale": 100,
              "shadowBlur": 0,
              "animations": [
                { "prop": "x", "from": -200, "to": 540, "start": 2.0, "end": 2.8, "ease": "easeOutBounce" },
                { "prop": "grayscale", "from": 100, "to": 0, "start": 4.0, "end": 4.4, "ease": "linear" },
                { "prop": "color", "from": "#475569", "to": "#10b981", "start": 4.0, "end": 4.4, "ease": "linear" },
                { "prop": "shadowBlur", "from": 0, "to": 50, "start": 4.0, "end": 4.4, "ease": "easeOutBounce" },
                { "prop": "shadowColor", "from": "#10b981", "to": "#10b981", "start": 4.0, "end": 4.4, "ease": "linear" }
              ]
            },
            {
              "id": "laser_escaneo",
              "type": "line",
              "x1": 250,
              "y1": 500,
              "x2": 830,
              "y2": 500,

              "opacity": 0,
              "shadowBlur": 40,
              "shadowColor": "#38bdf8",
              "animations": [
                { "prop": "opacity", "from": 0, "to": 1, "start": 3.2, "end": 3.5, "ease": "linear" },
                { "prop": "y1", "from": 500, "to": 1450, "start": 3.5, "end": 4.8, "ease": "easeInOut" },
                { "prop": "y2", "from": 500, "to": 1450, "start": 3.5, "end": 4.8, "ease": "easeInOut" },
                { "prop": "opacity", "from": 1, "to": 0, "start": 4.7, "end": 4.9, "ease": "linear" }
              ]
            },
            {
              "id": "pantalla_cristal",
              "type": "rect",
              "x": 540,
              "y": 960,
              "width": 460,
              "height": 960,
              "color": "#020617",
              "anchor": "center",
              "opacity": 0,
              "blur": 0,
              "animations": [
                { "prop": "opacity", "from": 0, "to": 0.85, "start": 5.0, "end": 5.5, "ease": "easeOut" },
                { "prop": "scale", "from": 1.2, "to": 1.0, "start": 5.0, "end": 5.5, "ease": "easeOutBounce" },
                { "prop": "blur", "from": 0, "to": 10, "start": 5.0, "end": 5.5, "ease": "easeOut" },
                { "prop": "color", "from": "#020617", "to": "#000000", "start": 5.5, "end": 6.0, "ease": "linear" }
              ]
            },
            {
              "id": "logo_marca",
              "type": "text",
              "text": "techexchange",
              "x": 540,
              "y": 880,
              "fontSize": 90,
              "color": "#ffffff",
              "blur": 50,
              "opacity": 0,
              "shadowBlur": 0,
              "animations": [
                { "prop": "opacity", "from": 0, "to": 1, "start": 6.0, "end": 6.5, "ease": "linear" },
                { "prop": "blur", "from": 50, "to": 0, "start": 6.0, "end": 6.5, "ease": "easeOut" },
                { "prop": "scale", "from": 0.5, "to": 1.0, "start": 6.0, "end": 6.5, "ease": "easeOutBounce" },
                { "prop": "color", "from": "#ffffff", "to": "#cbfb45", "start": 6.5, "end": 7.0, "ease": "easeInOut" },
                { "prop": "shadowBlur", "from": 0, "to": 80, "start": 6.5, "end": 7.0, "ease": "easeOutBounce" },
                { "prop": "shadowColor", "from": "#cbfb45", "to": "#cbfb45", "start": 6.5, "end": 7.0, "ease": "linear" }
              ]
            },
            {
              "id": "texto_servicio",
              "type": "text",
              "text": "HARDWARE RESTAURADO",
              "x": 540,
              "y": 1000,
              "fontSize": 40,
              "color": "#10b981",
              "opacity": 0,
              "animations": [
                { "prop": "opacity", "from": 0, "to": 1, "start": 6.8, "end": 7.2, "ease": "linear" },
                { "prop": "y", "from": 1050, "to": 1000, "start": 6.8, "end": 7.3, "ease": "easeOutBounce" }
              ]
            }
          ]
        };

        // Motores Matemáticos de Aceleración
        const Easing = {
            linear: t => t,
            easeOut: t => 1 - Math.pow(1 - t, 3),
            easeInOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
            easeOutBounce: t => {
                const n1 = 7.5625, d1 = 2.75;
                if (t < 1 / d1) return n1 * t * t;
                if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
                if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
                return n1 * (t -= 2.625 / d1) * t + 0.984375;
            }
        };

        const hexToRgb = (hex) => {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
        };

        const interpolateColor = (color1, color2, factor) => {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + factor * (c2.r - c1.r));
            const g = Math.round(c1.g + factor * (c2.g - c1.g));
            const b = Math.round(c1.b + factor * (c2.b - c1.b));
            return `rgb(${r}, ${g}, ${b})`;
        };

        function App() {
            const [jsonText, setJsonText] = useState(JSON.stringify(initialJSON, null, 2));
            const [data, setData] = useState(initialJSON);
            const [time, setTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const canvasRef = useRef(null);
            const animRef = useRef(null);

            const handleSync = () => {
                try {
                    setData(JSON.parse(jsonText));
                    setTime(0);
                } catch (e) {
                    alert("Error en el JSON");
                }
            };

            // SOLUCIÓN 1: getAnimatedValue ahora recibe el currentT (tiempo exacto del exportador)
            const getAnimatedValue = (element, propName, defaultValue, currentT) => {
                const anims = element.animations?.filter(a => a.prop === propName);
                if (!anims || anims.length === 0) return defaultValue;

                let currentValue = anims[0].from;
                for (const anim of anims) {
                    if (currentT < anim.start) continue;
                    if (currentT >= anim.end) {
                        currentValue = anim.to;
                        continue;
                    }
                    const progress = (currentT - anim.start) / (anim.end - anim.start);
                    const easeFn = Easing[anim.ease || 'linear'] || Easing.linear;
                    
                    if (propName.toLowerCase().includes('color')) {
                        currentValue = interpolateColor(anim.from, anim.to, easeFn(progress));
                    } else {
                        currentValue = anim.from + (anim.to - anim.from) * easeFn(progress);
                    }
                }
                return currentValue;
            };

            // SOLUCIÓN 2: renderCanvas usa el currentT para dibujar
            const renderCanvas = (currentT) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { config, elements } = data;

                ctx.fillStyle = config.background || "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                elements.forEach(el => {
                    ctx.save();
                    
                    const x = getAnimatedValue(el, 'x', el.x || 0, currentT);
                    const y = getAnimatedValue(el, 'y', el.y || 0, currentT);
                    const scale = getAnimatedValue(el, 'scale', el.scale || 1, currentT);
                    const opacity = getAnimatedValue(el, 'opacity', el.opacity !== undefined ? el.opacity : 1, currentT);
                    const rot = getAnimatedValue(el, 'rotation', el.rotation || 0, currentT);
                    const blur = getAnimatedValue(el, 'blur', el.blur || 0, currentT);
                    const grayscale = getAnimatedValue(el, 'grayscale', el.grayscale || 0, currentT);
                    const shadowBlur = getAnimatedValue(el, 'shadowBlur', el.shadowBlur || 0, currentT);
                    const color = getAnimatedValue(el, 'color', el.color || "#ffffff", currentT);

                    ctx.globalAlpha = Math.max(0, Math.min(1, opacity));
                    
                    let filterStr = "";
                    if (blur > 0) filterStr += `blur(${blur}px) `;
                    if (grayscale > 0) filterStr += `grayscale(${grayscale}%)`;
                    if (filterStr) ctx.filter = filterStr.trim();

                    if (shadowBlur > 0) {
                        ctx.shadowBlur = shadowBlur;
                        ctx.shadowColor = getAnimatedValue(el, 'shadowColor', el.shadowColor || color, currentT);
                    }
                    
                    if (el.type === 'rect') {
                        const w = getAnimatedValue(el, 'width', el.width, currentT);
                        const h = getAnimatedValue(el, 'height', el.height, currentT);
                        ctx.translate(x, y);
                        ctx.rotate(rot * Math.PI / 180);
                        ctx.scale(scale, scale);
                        ctx.fillStyle = color;
                        if (el.anchor === 'center') {
                            ctx.fillRect(-w/2, -h/2, w, h);
                        } else {
                            ctx.fillRect(0, 0, w, h);
                        }
                    } 
                    else if (el.type === 'circle') {
                        const r = getAnimatedValue(el, 'radius', el.radius, currentT);
                        ctx.translate(x, y);
                        ctx.scale(scale, scale);
                        ctx.beginPath();
                        ctx.arc(0, 0, r, 0, Math.PI * 2);
                        ctx.fillStyle = color;
                        ctx.fill();
                    }
                    else if (el.type === 'line') {
                        const x2 = getAnimatedValue(el, 'x2', el.x2, currentT);
                        const y2 = getAnimatedValue(el, 'y2', el.y2, currentT);
                        
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = color;
                        ctx.lineWidth = el.lineWidth || 5;
                        ctx.stroke();
                    }
                    else if (el.type === 'text') {
                        ctx.translate(x, y);
                        ctx.scale(scale, scale);
                        ctx.fillStyle = color;
                        ctx.font = `bold ${el.fontSize}px sans-serif`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(el.text, 0, 0);
                    }

                    ctx.restore();
                });
            };

            useEffect(() => {
                if (isPlaying && !isExporting) {
                    let lastTime = performance.now();
                    const loop = (now) => {
                        const dt = (now - lastTime) / 1000;
                        lastTime = now;
                        setTime(prev => {
                            const next = prev + dt;
                            return next > data.config.duration ? 0 : next;
                        });
                        animRef.current = requestAnimationFrame(loop);
                    };
                    animRef.current = requestAnimationFrame(loop);
                } else {
                    cancelAnimationFrame(animRef.current);
                }
                return () => cancelAnimationFrame(animRef.current);
            }, [isPlaying, data.config.duration, isExporting]);

            useEffect(() => {
                if (!isExporting) {
                    renderCanvas(time);
                }
            }, [time, data, isExporting]);

            // SOLUCIÓN 3: Sincronizar el reloj real con el MediaRecorder
            const handleExport = async () => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                setIsPlaying(false);
                setIsExporting(true);
                setTime(0);

                const stream = canvas.captureStream(data.config.fps);
                const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 });
                const chunks = [];
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `techexchange_render_${Date.now()}.webm`;
                    a.click();
                    setIsExporting(false);
                    setTime(0);
                    renderCanvas(0);
                };

                mediaRecorder.start();

                let startTime = performance.now();
                let exportFrameId;

                const exportLoop = (now) => {
                    const elapsedTime = (now - startTime) / 1000;

                    if (elapsedTime > data.config.duration) {
                        mediaRecorder.stop();
                        cancelAnimationFrame(exportFrameId);
                        return;
                    }
                    
                    // Actualizamos la UI visualmente
                    setTime(elapsedTime);
                    // Dibujamos el frame EXACTO sincronizado
                    renderCanvas(elapsedTime);
                    
                    exportFrameId = requestAnimationFrame(exportLoop);
                };

                exportFrameId = requestAnimationFrame(exportLoop);
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    <div className="w-1/3 bg-slate-900 border-r border-slate-800 flex flex-col z-10 shadow-2xl">
                        <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                            <h2 className="font-bold text-amber-500 text-sm tracking-wider"><i className="fas fa-bolt mr-2"></i>VIBE GRAPHICS PRO</h2>
                            <button onClick={handleSync} className="bg-slate-800 border border-slate-700 hover:bg-slate-700 px-4 py-1.5 text-xs font-bold rounded transition-colors">
                                <i className="fas fa-rotate mr-2"></i>Sincronizar
                            </button>
                        </div>
                        <textarea 
                            value={jsonText} 
                            onChange={(e) => setJsonText(e.target.value)}
                            className="flex-1 bg-slate-900 p-4 text-emerald-400 font-mono text-xs focus:outline-none resize-none leading-relaxed"
                            spellCheck="false"
                        ></textarea>
                    </div>

                    <div className="w-2/3 flex flex-col bg-slate-950 relative">
                        {isExporting && (
                            <div className="absolute inset-0 bg-black/85 z-50 flex items-center justify-center flex-col backdrop-blur-sm">
                                <i className="fas fa-microchip animate-spin text-5xl text-amber-500 mb-6"></i>
                                <h2 className="text-2xl font-bold tracking-tight">Renderizando...</h2>
                                <p className="text-slate-400 mt-2 font-mono text-sm">Grabando directamente del Canvas a {data.config.fps} FPS puros</p>
                            </div>
                        )}
                        
                        <div className="flex-1 flex items-center justify-center p-8 overflow-hidden">
                            <div className="relative shadow-2xl shadow-indigo-900/20 border border-slate-800 rounded-lg overflow-hidden bg-black" style={{ height: '80vh', aspectRatio: '9/16' }}>
                                <canvas 
                                    ref={canvasRef} 
                                    width={data.config.width} 
                                    height={data.config.height} 
                                    className="w-full h-full object-contain"
                                ></canvas>
                            </div>
                        </div>

                        <div className="h-20 bg-slate-900 border-t border-slate-800 px-8 flex items-center justify-between">
                            <div className="flex items-center space-x-4">
                                <button onClick={() => setTime(0)} className="text-slate-400 hover:text-white text-xl transition-colors"><i className="fas fa-backward-step"></i></button>
                                <button onClick={() => setIsPlaying(!isPlaying)} className="w-12 h-12 bg-amber-500 hover:bg-amber-400 rounded-full text-black flex items-center justify-center text-xl shadow-lg transition-transform hover:scale-105">
                                    <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play ml-1'}`}></i>
                                </button>
                                <span className="font-mono text-amber-500 text-sm font-bold bg-slate-950 px-3 py-1.5 rounded-lg border border-slate-800">
                                    {time.toFixed(2)}s / {data.config.duration}s
                                </span>
                            </div>

                            <button onClick={handleExport} className="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-bold px-6 py-3 rounded-lg shadow-lg shadow-emerald-900/40 flex items-center space-x-2 transition-all">
                                <i className="fas fa-download"></i>
                                <span>Exportar Video Directo</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
