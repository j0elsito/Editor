<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeEditor Studio Pro 🎬</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0b0f19; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialJSON = {
          "metadata": {
            "title": "Promo TechExchange",
            "resolution": { "width": 1080, "height": 1920 },
            "fps": 30,
            "totalDuration": 10.0
          },
          "timeline": {
            "videoTracks": [
              { "id": "v-1", "name": "Fondo_Abstracto.mp4", "start": 0.0, "end": 5.0, "speed": 1.0, "color": "#3b82f6" },
              { "id": "v-2", "name": "Review_Dispositivo.mp4", "start": 5.0, "end": 10.0, "speed": 1.0, "color": "#8b5cf6" }
            ],
            "graphicTracks": [
              { "id": "g-1", "name": "Intro Pop", "content": "⚡ TECHEXCHANGE ⚡", "start": 1.0, "end": 4.5, "scale": 1.3, "animation": "pop", "color": "#f59e0b" },
              { "id": "g-2", "name": "Subtítulo Slide", "content": "Vibe Coding Active", "start": 2.2, "end": 4.5, "scale": 0.9, "animation": "slide-up", "color": "#10b981" },
              { "id": "g-3", "name": "Cierre Fade", "content": "Soporte Técnico Premium", "start": 5.5, "end": 9.5, "scale": 1.1, "animation": "fade", "color": "#ec4899" }
            ]
          }
        };

        function App() {
            const [jsonText, setJsonText] = useState(JSON.stringify(initialJSON, null, 2));
            const [timelineData, setTimelineData] = useState(initialJSON);
            const [selectedElement, setSelectedElement] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [isExporting, setIsExporting] = useState(false);
            const [exportProgress, setExportProgress] = useState(0);
            const [error, setError] = useState(null);
            
            const canvasRef = useRef(null);
            const requestRef = useRef(null);
            const previousTimeRef = useRef(null);

            const handleSyncCode = () => {
                try {
                    const parsed = JSON.parse(jsonText);
                    if (!parsed.timeline || !parsed.metadata) throw new Error("Estructura JSON inválida.");
                    setTimelineData(parsed);
                    setError(null);
                } catch (err) {
                    setError("Error de Sintaxis: " + err.message);
                }
            };

            const updateGlobalData = (updatedData) => {
                setTimelineData(updatedData);
                setJsonText(JSON.stringify(updatedData, null, 2));
            };

            const drawCanvasFrame = (time) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const duration = timelineData.metadata.totalDuration;

                ctx.fillStyle = '#020617';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const activeVideo = timelineData.timeline.videoTracks.find(v => time >= v.start && time <= v.end);
                if (activeVideo) {
                    ctx.fillStyle = activeVideo.color;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 4;
                    const offset = (time * 100 * activeVideo.speed) % 40;
                    for (let y = offset; y < canvas.height; y += 40) {
                        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                    }

                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.font = '12px monospace';
                    ctx.fillText(`🎬 ${activeVideo.name} (${activeVideo.speed}x)`, 15, 25);
                }

                const activeGraphics = timelineData.timeline.graphicTracks.filter(g => time >= g.start && time <= g.end);
                activeGraphics.forEach(g => {
                    ctx.save();
                    
                    let x = canvas.width / 2;
                    let y = canvas.height / 2;
                    let scale = g.scale || 1.0;
                    let opacity = 1.0;
                    
                    const age = time - g.start;
                    const animationType = g.animation || 'pop';

                    if (animationType === 'pop' && age < 0.4) {
                        const t = age / 0.4;
                        scale *= (1.0 + Math.sin(t * Math.PI) * 0.4); 
                    } else if (animationType === 'slide-up' && age < 0.5) {
                        const t = age / 0.5;
                        const easeOutQuad = t * (2 - t);
                        y += (1 - easeOutQuad) * 60; 
                        opacity = easeOutQuad;
                    } else if (animationType === 'fade') {
                        if (age < 0.3) opacity = age / 0.3; 
                        const timeLeft = g.end - time;
                        if (timeLeft < 0.3) opacity = timeLeft / 0.3; 
                    }

                    ctx.globalAlpha = Math.max(0, Math.min(1, opacity));
                    ctx.translate(x, y);
                    ctx.scale(scale, scale);

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                    ctx.strokeStyle = g.color;
                    ctx.lineWidth = 2;
                    const textWidth = ctx.measureText(g.content).width + 30;
                    ctx.fillRect(-textWidth/2, -20, textWidth, 38);
                    ctx.strokeRect(-textWidth/2, -20, textWidth, 38);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 15px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(g.content, 0, 0);

                    ctx.restore();
                });
            };

            const animatePlayhead = (timestamp) => {
                if (!previousTimeRef.current) previousTimeRef.current = timestamp;
                const deltaTime = (timestamp - previousTimeRef.current) / 1000;
                previousTimeRef.current = timestamp;

                setCurrentTime((prev) => {
                    const next = prev + deltaTime;
                    if (next >= timelineData.metadata.totalDuration) return 0;
                    return next;
                });

                requestRef.current = requestAnimationFrame(animatePlayhead);
            };

            useEffect(() => {
                if (isPlaying && !isExporting) {
                    previousTimeRef.current = null;
                    requestRef.current = requestAnimationFrame(animatePlayhead);
                } else {
                    cancelAnimationFrame(requestRef.current);
                }
                return () => cancelAnimationFrame(requestRef.current);
            }, [isPlaying, timelineData.metadata.totalDuration, isExporting]);

            useEffect(() => {
                drawCanvasFrame(currentTime);
            }, [currentTime, timelineData]);

            const handleSplitClip = () => {
                if (!selectedElement) return;
                const updated = { ...timelineData };
                const { id, trackType } = selectedElement;

                if (trackType === 'video') {
                    const target = updated.timeline.videoTracks.find(t => t.id === id);
                    if (target && currentTime > target.start && currentTime < target.end) {
                        const originalEnd = target.end;
                        target.end = currentTime;

                        updated.timeline.videoTracks.push({
                            id: `v-split-${Date.now()}`,
                            name: `${target.name} (Parte 2)`,
                            start: currentTime,
                            end: originalEnd,
                            speed: target.speed,
                            color: target.color
                        });
                        setSelectedElement(null);
                        updateGlobalData(updated);
                    }
                }
            };

            const handleDuplicateClip = () => {
                if (!selectedElement) return;
                const updated = { ...timelineData };
                const { id, trackType } = selectedElement;
                const newId = `dup-${Date.now().toString().slice(-4)}`;

                if (trackType === 'video') {
                    const target = updated.timeline.videoTracks.find(t => t.id === id);
                    if (target) {
                        updated.timeline.videoTracks.push({ ...target, id: newId, start: target.end, end: target.end + (target.end - target.start) });
                    }
                } else {
                    const target = updated.timeline.graphicTracks.find(t => t.id === id);
                    if (target) {
                        updated.timeline.graphicTracks.push({ ...target, id: newId, start: target.start + 1, end: target.end + 1, name: `${target.name} Copia` });
                    }
                }
                updateGlobalData(updated);
            };

            const handleExportVideoFile = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                setIsPlaying(false);
                setIsExporting(true);
                setExportProgress(0);
                setCurrentTime(0);

                const stream = canvas.captureStream(timelineData.metadata.fps);
                const mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9',
                    videoBitsPerSecond: 5000000 
                });

                const recordedChunks = [];
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${timelineData.metadata.title.toLowerCase().replace(/\s+/g, '_')}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    setIsExporting(false);
                };

                mediaRecorder.start();

                const totalDuration = timelineData.metadata.totalDuration;
                let currentExportTime = 0;
                const intervalStep = 1 / timelineData.metadata.fps;

                const exportInterval = setInterval(() => {
                    currentExportTime += intervalStep;
                    if (currentExportTime >= totalDuration) {
                        clearInterval(exportInterval);
                        mediaRecorder.stop();
                    } else {
                        setCurrentTime(currentExportTime);
                        setExportProgress(Math.floor((currentExportTime / totalDuration) * 100));
                    }
                }, intervalStep * 1000);
            };

            const updateSelectedProperty = (field, value) => {
                if (!selectedElement) return;
                const updated = { ...timelineData };
                const { id, trackType } = selectedElement;

                const list = trackType === 'video' ? updated.timeline.videoTracks : updated.timeline.graphicTracks;
                const item = list.find(t => t.id === id);
                if (item) {
                    item[field] = value;
                    setSelectedElement({ ...selectedElement, target: item });
                }
                updateGlobalData(updated);
            };

            return (
                <div className="min-h-screen flex flex-col relative select-none">
                    {/* Modal de Progreso de Exportación */}
                    {isExporting && (
                        <div className="absolute inset-0 bg-slate-950/90 z-50 flex flex-col items-center justify-center backdrop-blur-md">
                            <div className="bg-slate-900 border border-slate-800 p-8 rounded-2xl w-80 text-center shadow-2xl">
                                <i className="fas fa-circle-notch text-4xl text-indigo-500 animate-spin mb-4"></i>
                                <h3 className="text-lg font-bold">Procesando Animaciones...</h3>
                                <p className="text-xs text-slate-400 mt-1">Renderizando Canvas a archivo de video</p>
                                <div className="w-full bg-slate-950 h-3 rounded-full mt-6 overflow-hidden border border-slate-800">
                                    <div style={{ width: `${exportProgress}%` }} className="bg-gradient-to-r from-violet-500 to-indigo-500 h-full transition-all duration-100"></div>
                                </div>
                                <span className="text-xs font-mono font-bold mt-2 inline-block text-indigo-400">{exportProgress}%</span>
                            </div>
                        </div>
                    )}

                    {/* Navbar Superior */}
                    <header className="bg-slate-900 border-b border-slate-800 px-6 py-4 flex justify-between items-center shadow-md">
                        <div className="flex items-center space-x-3">
                            <div className="bg-gradient-to-tr from-violet-600 to-indigo-600 p-2 rounded-xl text-white shadow-md shadow-indigo-900/30">
                                <i className="fas fa-video text-lg"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold tracking-tight text-white">VibeEditor Studio</h1>
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-mono">Real-Time Render Engine</p>
                            </div>
                        </div>
                        
                        {/* NUEVOS BOTONES DE ACCIÓN EN EL HEADER */}
                        <div className="flex items-center space-x-3">
                            <a 
                                href="bento-ui.html" 
                                target="_blank"
                                className="bg-slate-800 hover:bg-slate-700 text-amber-400 font-semibold text-sm px-4 py-2.5 rounded-xl shadow-lg transition-all flex items-center space-x-2 border border-amber-500/20"
                            >
                                <i className="fas fa-cubes"></i>
                                <span>Abrir Bento Studio</span>
                            </a>

                            <button 
                                onClick={handleExportVideoFile}
                                className="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-semibold text-sm px-5 py-2.5 rounded-xl shadow-lg transition-all flex items-center space-x-2 border border-emerald-400/20"
                            >
                                <i className="fas fa-cloud-arrow-down"></i>
                                <span>Exportar a Galería (WEBM)</span>
                            </button>
                        </div>
                    </header>

                    {/* Espacio de Trabajo Principal */}
                    <div className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-4 p-4 overflow-hidden">
                        
                        {/* Editor de JSON Izquierdo */}
                        <div className="lg:col-span-5 bg-slate-900 rounded-2xl border border-slate-800 flex flex-col p-4 shadow-xl">
                            <div className="flex justify-between items-center mb-3">
                                <span className="text-xs font-bold uppercase text-slate-400 font-mono tracking-wider"><i className="fas fa-code mr-1.5 text-indigo-400"></i>Estructura del Proyecto</span>
                                <button onClick={handleSyncCode} className="bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600/30 border border-indigo-500/30 text-xs font-bold px-3 py-1.5 rounded-lg transition-all">
                                    <i className="fas fa-rotate mr-1"></i>Sincronizar Código
                                </button>
                            </div>
                            <textarea
                                className="flex-1 w-full bg-slate-950 text-emerald-400 font-mono text-[11px] p-4 rounded-xl border border-slate-850 focus:outline-none focus:border-indigo-500/50 resize-none leading-relaxed"
                                value={jsonText}
                                onChange={(e) => setJsonText(e.target.value)}
                            />
                            {error && <div className="mt-2 bg-red-950/40 border border-red-900 text-red-400 text-xs p-2 rounded-lg font-mono">{error}</div>}
                        </div>

                        {/* Monitor y Controles de la Derecha */}
                        <div className="lg:col-span-7 flex flex-col space-y-4">
                            
                            {/* Monitor del Canvas Real */}
                            <div className="bg-slate-900 rounded-2xl border border-slate-800 p-4 flex flex-col items-center justify-center shadow-xl flex-1 relative">
                                <div className="w-[210px] h-[373px] bg-black rounded-xl shadow-2xl overflow-hidden border border-slate-700 relative">
                                    <canvas 
                                        ref={canvasRef} 
                                        width={270} 
                                        height={480} 
                                        className="w-full h-full object-contain"
                                    />
                                </div>

                                {/* Barra Controladora de Reproducción */}
                                <div className="w-full max-w-sm flex items-center justify-between mt-4 bg-slate-950 px-4 py-2 rounded-xl border border-slate-850 shadow-inner">
                                    <button onClick={() => setCurrentTime(0)} className="text-slate-400 hover:text-white text-sm"><i className="fas fa-backward-step"></i></button>
                                    <button onClick={() => setIsPlaying(!isPlaying)} className="w-9 h-9 rounded-full bg-indigo-600 text-white flex items-center justify-center text-sm shadow-md hover:bg-indigo-500 transition-colors">
                                        <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play'}`}></i>
                                    </button>
                                    <span className="text-xs font-mono font-bold text-indigo-400">{currentTime.toFixed(2)}s / {timelineData.metadata.totalDuration}s</span>
                                </div>
                            </div>

                            {/* Inspector Expandido */}
                            <div className="bg-slate-900 rounded-2xl border border-slate-800 p-4 h-48 flex flex-col shadow-xl">
                                <div className="flex justify-between items-center mb-2 border-b border-slate-800 pb-2">
                                    <span className="text-xs font-bold uppercase text-slate-400 font-mono"><i className="fas fa-sliders-up mr-1 text-indigo-400"></i>Caja de Herramientas Avanzada</span>
                                    {selectedElement && (
                                        <div className="space-x-2">
                                            <button onClick={handleDuplicateClip} className="text-slate-300 bg-slate-800 hover:bg-slate-700 text-[11px] px-2.5 py-1 rounded border border-slate-700"><i className="fas fa-copy mr-1"></i>Duplicar</button>
                                            {selectedElement.trackType === 'video' && <button onClick={handleSplitClip} className="text-amber-400 bg-amber-950/30 border border-amber-900 text-[11px] px-2.5 py-1 rounded"><i className="fas fa-scissors mr-1"></i>Cortar Clip (Split)</button>}
                                        </div>
                                    )}
                                </div>

                                {selectedElement ? (
                                    <div className="grid grid-cols-2 gap-3 text-xs mt-1">
                                        <div>
                                            <label className="block text-slate-400 font-medium mb-1">Contenido / Nombre:</label>
                                            <input type="text" className="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-1 text-slate-200 focus:outline-none" value={selectedElement.target.content || selectedElement.target.name} onChange={(e) => updateSelectedProperty(selectedElement.trackType === 'video' ? 'name' : 'content', e.target.value)} />
                                        </div>
                                        {selectedElement.trackType === 'video' ? (
                                            <div>
                                                <label className="block text-slate-400 font-medium mb-1">Velocidad multiplicadora:</label>
                                                <input type="range" min="0.25" max="3.0" step="0.25" className="w-full accent-indigo-500 mt-1" value={selectedElement.target.speed || 1} onChange={(e) => updateSelectedProperty('speed', parseFloat(e.target.value))} />
                                            </div>
                                        ) : (
                                            <div>
                                                <label className="block text-slate-400 font-medium mb-1">Estilo de Animación:</label>
                                                <select className="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-1 text-slate-200 focus:outline-none" value={selectedElement.target.animation || 'pop'} onChange={(e) => updateSelectedProperty('animation', e.target.value)}>
                                                    <option value="pop">Pop Out (Elastic Bounce)</option>
                                                    <option value="slide-up">Slide Up (Quad Smooth)</option>
                                                    <option value="fade">Pure Fade In/Out</option>
                                                </select>
                                            </div>
                                        )}
                                        <div>
                                            <label className="block text-slate-400 font-medium mb-1">Tiempo de Entrada (s):</label>
                                            <input type="number" step="0.1" className="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-1 text-slate-200 focus:outline-none" value={selectedElement.target.start} onChange={(e) => updateSelectedProperty('start', parseFloat(e.target.value) || 0)} />
                                        </div>
                                        <div>
                                            <label className="block text-slate-400 font-medium mb-1">Tiempo de Salida (s):</label>
                                            <input type="number" step="0.1" className="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-1 text-slate-200 focus:outline-none" value={selectedElement.target.end} onChange={(e) => updateSelectedProperty('end', parseFloat(e.target.value) || 0)} />
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-1 flex items-center justify-center text-slate-500 italic text-xs">Selecciona cualquier bloque de abajo para activar los efectos cinéticos y cortes.</div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Timeline Inferior */}
                    <div className="bg-slate-900 border-t border-slate-800 p-4 shadow-2xl">
                        <div className="bg-slate-950 rounded-xl p-4 border border-slate-850 relative">
                            
                            {/* Regla del Tiempo */}
                            <div className="h-5 border-b border-slate-800 flex relative text-[9px] font-mono text-slate-500 mb-2 select-none">
                                {Array.from({ length: Math.ceil(timelineData.metadata.totalDuration) + 1 }).map((_, i) => (
                                    <div key={i} style={{ left: `${(i / timelineData.metadata.totalDuration) * 100}%` }} className="absolute -translate-x-1/2 flex flex-col items-center h-full justify-between">
                                        <span>{i}s</span>
                                        <div className="w-[1px] h-1.5 bg-slate-700"></div>
                                    </div>
                                ))}
                            </div>

                            {/* Barra Roja del Playhead */}
                            <div style={{ left: `${(currentTime / timelineData.metadata.totalDuration) * 100}%` }} className="absolute top-4 bottom-4 w-[2px] bg-red-500 z-30 pointer-events-none">
                                <div className="w-2.5 h-2.5 bg-red-500 rounded-full absolute -top-1.5 -left-[4px] shadow"></div>
                            </div>

                            {/* Pista de Video */}
                            <div className="flex items-center h-10 border-b border-slate-900/60 relative my-1">
                                <div className="w-20 text-[10px] font-bold uppercase tracking-wider text-slate-400 z-10"><i className="fas fa-clapperboard mr-1 text-blue-400"></i> Video</div>
                                <div className="flex-1 h-full relative">
                                    {timelineData.timeline.videoTracks.map(track => {
                                        const left = (track.start / timelineData.metadata.totalDuration) * 100;
                                        const width = ((track.end - track.start) / timelineData.metadata.totalDuration) * 100;
                                        const isSel = selectedElement?.id === track.id;
                                        return (
                                            <div key={track.id} onClick={() => setSelectedElement({ id: track.id, trackType: 'video', target: track })} style={{ left: `${left}%`, width: `${width}%`, backgroundColor: track.color }} className={`absolute top-1 bottom-1 rounded-md p-1 text-white text-[9px] font-semibold cursor-pointer border-2 shadow transition-all truncate ${isSel ? 'border-white scale-[1.01] ring-2 ring-indigo-400/50 z-20' : 'border-transparent hover:brightness-110'}`}>
                                                {track.name} ({track.speed}x)
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Pista de Gráficos */}
                            <div className="flex items-center h-10 relative my-1">
                                <div className="w-20 text-[10px] font-bold uppercase tracking-wider text-slate-400 z-10"><i className="fas fa-font mr-1 text-amber-400"></i> Motion</div>
                                <div className="flex-1 h-full relative">
                                    {timelineData.timeline.graphicTracks.map(track => {
                                        const left = (track.start / timelineData.metadata.totalDuration) * 100;
                                        const width = ((track.end - track.start) / timelineData.metadata.totalDuration) * 100;
                                        const isSel = selectedElement?.id === track.id;
                                        return (
                                            <div key={track.id} onClick={() => setSelectedElement({ id: track.id, trackType: 'graphic', target: track })} style={{ left: `${left}%`, width: `${width}%`, backgroundColor: track.color }} className={`absolute top-1 bottom-1 rounded-md p-1 text-slate-950 text-[9px] font-bold cursor-pointer border-2 shadow transition-all truncate ${isSel ? 'border-white scale-[1.01] ring-2 ring-amber-400/50 z-20' : 'border-transparent hover:brightness-110'}`}>
                                                {track.content} [{track.animation}]
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
