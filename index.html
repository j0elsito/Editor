<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeEditor Pro 🎬 - Editor de Video por Código</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialJSON = {
          "metadata": {
            "title": "Mi Vibe Video",
            "resolution": { "width": 1080, "height": 1920 },
            "fps": 30,
            "totalDuration": 15.0
          },
          "timeline": {
            "videoTracks": [
              { "id": "clip-1", "name": "Video_Fondo_01.mp4", "start": 0.0, "end": 6.0, "speed": 1.0, "color": "bg-indigo-600" },
              { "id": "clip-2", "name": "Transicion_Glitch.mp4", "start": 6.0, "end": 9.5, "speed": 1.5, "color": "bg-purple-600" },
              { "id": "clip-3", "name": "Review_Telefono.mp4", "start": 9.5, "end": 15.0, "speed": 1.0, "color": "bg-blue-600" }
            ],
            "graphicTracks": [
              { "id": "text-1", "name": "Subtítulo Principal", "content": "¡Editor de Video por Código!", "start": 1.0, "end": 5.0, "scale": 1.2, "color": "bg-amber-500" },
              { "id": "text-2", "name": "Crédito Final", "content": "techexchange pro", "start": 11.0, "end": 14.0, "scale": 1.0, "color": "bg-emerald-500" }
            ]
          }
        };

        function App() {
            const [jsonText, setJsonText] = useState(JSON.stringify(initialJSON, null, 2));
            const [timelineData, setTimelineData] = useState(initialJSON);
            const [selectedElement, setSelectedElement] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [error, setError] = useState(null);
            const playbackInterval = useRef(null);

            // Synchronize visual timeline from code editor
            const handleSyncCode = () => {
                try {
                    const parsed = JSON.parse(jsonText);
                    if (!parsed.timeline || !parsed.metadata) {
                        throw new Error("Estructura inválida. Debe contener 'metadata' y 'timeline'.");
                    }
                    setTimelineData(parsed);
                    setError(null);
                } catch (err) {
                    setError("Error de Sintaxis JSON: " + err.message);
                }
            };

            // Synchronize code editor from visual timeline changes
            const syncTracksToCode = (updatedData) => {
                setTimelineData(updatedData);
                setJsonText(JSON.stringify(updatedData, null, 2));
            };

            // Playback controls simulation
            useEffect(() => {
                if (isPlaying) {
                    playbackInterval.current = setInterval(() => {
                        setCurrentTime((prev) => {
                            const maxDuration = timelineData.metadata.totalDuration;
                            if (prev >= maxDuration) {
                                return 0; // Loop
                            }
                            return Math.min(prev + 0.1, maxDuration);
                        });
                    }, 100);
                } else {
                    clearInterval(playbackInterval.current);
                }
                return () => clearInterval(playbackInterval.current);
            }, [isPlaying, timelineData.metadata.totalDuration]);

            // Modify properties of selected element
            const updateSelectedProperty = (field, value) => {
                if (!selectedElement) return;

                const updated = { ...timelineData };
                const { id, trackType } = selectedElement;

                if (trackType === 'video') {
                    updated.timeline.videoTracks = updated.timeline.videoTracks.map(track => {
                        if (track.id === id) {
                            return { ...track, [field]: value };
                        }
                        return track;
                    });
                } else {
                    updated.timeline.graphicTracks = updated.timeline.graphicTracks.map(track => {
                        if (track.id === id) return { ...track, [field]: value };
                        return track;
                    });
                }
                
                // Update track target reference for inspector continuity
                const currentTrackList = trackType === 'video' ? updated.timeline.videoTracks : updated.timeline.graphicTracks;
                const updatedTrack = currentTrackList.find(t => t.id === id);
                setSelectedElement({ ...selectedElement, target: updatedTrack });
                
                syncTracksToCode(updated);
            };

            // Add new items
            const addElement = (type) => {
                const updated = { ...timelineData };
                const id = `new-${Date.now().toString().slice(-4)}`;
                if (type === 'video') {
                    updated.timeline.videoTracks.push({
                        id,
                        name: "Nuevo_Clip_Añadido.mp4",
                        start: 0.0,
                        end: 4.0,
                        speed: 1.0,
                        color: "bg-cyan-600"
                    });
                } else {
                    updated.timeline.graphicTracks.push({
                        id,
                        name: "Nuevo Texto Animado",
                        content: "Texto Nuevo",
                        start: 2.0,
                        end: 6.0,
                        scale: 1.0,
                        color: "bg-pink-500"
                    });
                }
                syncTracksToCode(updated);
            };

            // Remove selected element
            const deleteSelected = () => {
                if (!selectedElement) return;
                const updated = { ...timelineData };
                const { id, trackType } = selectedElement;

                if (trackType === 'video') {
                    updated.timeline.videoTracks = updated.timeline.videoTracks.filter(t => t.id !== id);
                } else {
                    updated.timeline.graphicTracks = updated.timeline.graphicTracks.filter(t => t.id !== id);
                }
                setSelectedElement(null);
                syncTracksToCode(updated);
            };

            // Find actively playing assets to show on Canvas
            const activeVideo = timelineData.timeline.videoTracks.find(v => currentTime >= v.start && currentTime <= v.end);
            const activeGraphics = timelineData.timeline.graphicTracks.filter(g => currentTime >= g.start && currentTime <= g.end);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Top Bar */}
                    <header className="bg-slate-900 border-b border-slate-800 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center space-x-3">
                            <div className="bg-gradient-to-r from-violet-600 to-indigo-600 p-2 rounded-lg text-white">
                                <i className="fas fa-film text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">VibeEditor Pro</h1>
                                <p className="text-xs text-slate-400">Editor Híbrido Sincronizado por Código</p>
                            </div>
                        </div>
                        <div className="flex items-center space-x-4">
                            <span className="text-sm bg-slate-800 px-3 py-1.5 rounded-md text-slate-300 border border-slate-700">
                                <i className="fas fa-desktop mr-2 text-indigo-400"></i>Modo Desarrollo Local
                            </span>
                            <button 
                                onClick={() => alert("¡Enviando JSON al Servidor Local! Renderizando MP4 con FFmpeg...")}
                                className="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-semibold px-5 py-2 rounded-lg shadow-lg shadow-emerald-900/20 transition-all flex items-center space-x-2"
                            >
                                <i className="fas fa-file-export"></i>
                                <span>Exportar Video (MP4)</span>
                            </button>
                        </div>
                    </header>

                    {/* Main Section Divided in Panels */}
                    <div className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-4 p-4 overflow-hidden">
                        
                        {/* LEFT COLUMN: The Code Input (Gemini Sync Area) */}
                        <div className="lg:col-span-5 bg-slate-900 rounded-xl border border-slate-800 flex flex-col p-4 shadow-2xl">
                            <div className="flex justify-between items-center mb-3">
                                <div className="flex items-center space-x-2">
                                    <i className="fas fa-code text-indigo-400"></i>
                                    <h3 className="font-semibold text-sm uppercase tracking-wider text-slate-300">Código de Edición (JSON)</h3>
                                </div>
                                <button 
                                    onClick={handleSyncCode}
                                    className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-3 py-1.5 rounded transition-all flex items-center space-x-1"
                                >
                                    <i className="fas fa-sync-alt"></i>
                                    <span>Sincronizar Cambios</span>
                                </button>
                            </div>
                            
                            <div className="flex-1 relative">
                                <textarea
                                    className="w-full h-full bg-slate-950 text-emerald-400 font-mono text-xs p-3 rounded-lg border border-slate-800 focus:outline-none focus:border-indigo-500 resize-none leading-relaxed"
                                    value={jsonText}
                                    onChange={(e) => setJsonText(e.target.value)}
                                    placeholder="Pega aquí el código generado por Gemini..."
                                />
                            </div>
                            {error && (
                                <div className="mt-2 bg-red-950/50 border border-red-800 text-red-400 text-xs p-2 rounded-lg">
                                    <i className="fas fa-exclamation-triangle mr-1"></i> {error}
                                </div>
                            )}
                            <div className="mt-3 text-[11px] text-slate-500 bg-slate-950 p-2 rounded border border-slate-850">
                                <i className="fas fa-lightbulb text-amber-400 mr-1"></i> Puedes pegar directamente las estructuras modificadas por la IA para refrescar el reproductor y la línea de tiempo de inmediato.
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Player Viewport & Property Inspector */}
                        <div className="lg:col-span-7 flex flex-col space-y-4">
                            
                            {/* The Simulated Live Canvas Screen */}
                            <div className="bg-slate-900 rounded-xl border border-slate-800 p-4 flex flex-col items-center justify-center shadow-xl flex-1 relative">
                                <div className="absolute top-3 left-4 text-xs font-semibold text-slate-400 flex items-center space-x-2">
                                    <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                                    <span>Previsualización del Canvas ({timelineData.metadata.resolution.width}x{timelineData.metadata.resolution.height})</span>
                                </div>
                                
                                {/* 9:16 aspect ratio box simulating vertical phone view */}
                                <div className="w-[200px] h-[320px] bg-black rounded-lg shadow-2xl border-2 border-slate-700 relative overflow-hidden mt-4 flex items-center justify-center transition-all">
                                    {activeVideo ? (
                                        <div className={`absolute inset-0 ${activeVideo.color} opacity-40 flex flex-col items-center justify-center text-center p-2 transition-all duration-300`}>
                                            <i className="fas fa-photo-film text-3xl mb-1 text-white/50"></i>
                                            <span className="text-[10px] font-mono text-white tracking-tight truncate w-full">{activeVideo.name}</span>
                                            <span className="text-[9px] text-white/70 mt-1">Velocidad: {activeVideo.speed}x</span>
                                        </div>
                                    ) : (
                                        <div className="text-xs text-slate-600 italic">Fin de los clips</div>
                                    )}

                                    {/* Overlay Graphics Graphics Rendering Layer */}
                                    {activeGraphics.map(graphic => (
                                        <div 
                                            key={graphic.id} 
                                            style={{ transform: `scale(${graphic.scale || 1.0})` }}
                                            className="absolute bg-black/80 text-white px-2 py-1 rounded text-[11px] font-bold border border-white/20 text-center shadow-lg transition-all duration-200"
                                        >
                                            {graphic.content}
                                        </div>
                                    ))}
                                </div>

                                {/* Media Playback Controller Bar */}
                                <div className="w-full max-w-md flex flex-col items-center space-y-2 mt-4 bg-slate-950 p-3 rounded-lg border border-slate-800">
                                    <div className="flex items-center space-x-4">
                                        <button 
                                            onClick={() => setCurrentTime(0)}
                                            className="text-slate-400 hover:text-white transition-colors"
                                            title="Reiniciar"
                                        >
                                            <i className="fas fa-backward"></i>
                                        </button>
                                        <button 
                                            onClick={() => setIsPlaying(!isPlaying)}
                                            className={`w-10 h-10 rounded-full flex items-center justify-center text-white text-lg transition-all shadow-md ${isPlaying ? 'bg-amber-600 hover:bg-amber-500' : 'bg-indigo-600 hover:bg-indigo-500'}`}
                                        >
                                            <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play'}`}></i>
                                        </button>
                                        <span className="text-xs font-mono font-bold text-indigo-400">
                                            {currentTime.toFixed(1)}s / {timelineData.metadata.totalDuration.toFixed(1)}s
                                        </span>
                                    </div>
                                </div>
                            </div>

                            {/* Property Inspector Section for selected node */}
                            <div className="bg-slate-900 rounded-xl border border-slate-800 p-4 h-48 flex flex-col">
                                <div className="flex justify-between items-center mb-2 border-b border-slate-800 pb-2">
                                    <h4 className="text-xs font-bold uppercase tracking-wider text-slate-400">
                                        <i className="fas fa-sliders mr-1 text-slate-400"></i> Inspector de Propiedades
                                    </h4>
                                    {selectedElement && (
                                        <button 
                                            onClick={deleteSelected}
                                            className="text-red-400 hover:text-red-300 text-xs bg-red-950/40 px-2 py-1 rounded border border-red-900"
                                        >
                                            <i className="fas fa-trash-alt mr-1"></i> Borrar Elemento
                                        </button>
                                    )}
                                </div>

                                {selectedElement ? (
                                    <div className="grid grid-cols-2 gap-4 text-xs mt-1">
                                        <div>
                                            <label className="block text-slate-400 mb-1 font-semibold">Nombre del Recurso:</label>
                                            <input 
                                                type="text" 
                                                className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-indigo-500"
                                                value={selectedElement.target.name || ''} 
                                                onChange={(e) => updateSelectedProperty('name', e.target.value)}
                                            />
                                        </div>
                                        {selectedElement.trackType === 'video' ? (
                                            <div>
                                                <label className="block text-slate-400 mb-1 font-semibold">Velocidad de Reproducción:</label>
                                                <div className="flex items-center space-x-2">
                                                    <input 
                                                        type="range" min="0.25" max="3.0" step="0.25"
                                                        className="w-full accent-indigo-500"
                                                        value={selectedElement.target.speed || 1.0}
                                                        onChange={(e) => updateSelectedProperty('speed', parseFloat(e.target.value))}
                                                    />
                                                    <span className="font-mono bg-slate-950 px-1.5 py-0.5 rounded border border-slate-800 font-bold text-indigo-400">{selectedElement.target.speed}x</span>
                                                </div>
                                            </div>
                                        ) : (
                                            <div>
                                                <label className="block text-slate-400 mb-1 font-semibold">Contenido del Texto:</label>
                                                <input 
                                                    type="text" 
                                                    className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-indigo-500"
                                                    value={selectedElement.target.content || ''} 
                                                    onChange={(e) => updateSelectedProperty('content', e.target.value)}
                                                />
                                            </div>
                                        )}
                                        <div>
                                            <label className="block text-slate-400 mb-1 font-semibold">Tiempo Inicio (segundos):</label>
                                            <input 
                                                type="number" step="0.5" min="0"
                                                className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-indigo-500"
                                                value={selectedElement.target.start} 
                                                onChange={(e) => updateSelectedProperty('start', parseFloat(e.target.value) || 0)}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-slate-400 mb-1 font-semibold">Tiempo Fin (segundos):</label>
                                            <input 
                                                type="number" step="0.5" min="0"
                                                className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-indigo-500"
                                                value={selectedElement.target.end} 
                                                onChange={(e) => updateSelectedProperty('end', parseFloat(e.target.value) || 0)}
                                            />
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-1 flex items-center justify-center text-slate-500 italic text-xs">
                                        Haz clic en cualquier bloque de la línea de tiempo para ajustar su velocidad, posición o contenido.
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* BOTTOM PANEL: Visual Interactive Timeline */}
                    <div className="bg-slate-900 border-t border-slate-800 p-4 shadow-inner">
                        <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center space-x-4">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center">
                                    <i className="fas fa-stream mr-1.5 text-indigo-400"></i> Línea de Tiempo Interactiva
                                </span>
                                <div className="space-x-2">
                                    <button 
                                        onClick={() => addElement('video')}
                                        className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-2.5 py-1 rounded border border-slate-700 transition-colors"
                                    >
                                        <i className="fas fa-plus mr-1 text-indigo-400"></i> Clip Video
                                    </button>
                                    <button 
                                        onClick={() => addElement('graphic')}
                                        className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-2.5 py-1 rounded border border-slate-700 transition-colors"
                                    >
                                        <i className="fas fa-plus mr-1 text-amber-400"></i> Capa Gráfica
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Tracks Wrapper Box */}
                        <div className="bg-slate-950 rounded-xl p-4 border border-slate-850 relative">
                            
                            {/* Playhead Time indicator bar lines */}
                            <div className="h-6 border-b border-slate-800 flex relative text-[10px] font-mono text-slate-500 select-none mb-2">
                                {Array.from({ length: Math.ceil(timelineData.metadata.totalDuration) + 1 }).map((_, i) => (
                                    <div 
                                        key={i} 
                                        style={{ left: `${(i / timelineData.metadata.totalDuration) * 100}%` }}
                                        className="absolute -translate-x-1/2 flex flex-col items-center h-full justify-between"
                                    >
                                        <span>{i}s</span>
                                        <div className="w-[1px] h-2 bg-slate-700"></div>
                                    </div>
                                ))}
                            </div>

                            {/* Red Playhead line tracking current playback cursor */}
                            <div 
                                style={{ left: `${(currentTime / timelineData.metadata.totalDuration) * 100}%` }}
                                className="absolute top-4 bottom-4 w-[2px] bg-red-500 z-30 transition-all pointer-events-none"
                            >
                                <div className="w-3 h-3 bg-red-500 rounded-full absolute -top-1.5 -left-[5px] shadow shadow-red-950"></div>
                            </div>

                            {/* TRACK 1: Video Tracks Blocks */}
                            <div className="flex items-center h-12 border-b border-slate-900 relative my-1 group">
                                <div className="w-24 text-[11px] uppercase tracking-wider font-bold text-slate-400 flex items-center sticky left-0 z-10 bg-slate-950/80 pr-2">
                                    <i className="fas fa-video mr-1.5 text-indigo-500 text-xs"></i> Videos
                                </div>
                                <div className="flex-1 h-full relative">
                                    {timelineData.timeline.videoTracks.map(track => {
                                        const leftPercent = (track.start / timelineData.metadata.totalDuration) * 100;
                                        const widthPercent = ((track.end - track.start) / timelineData.metadata.totalDuration) * 100;
                                        const isSelected = selectedElement?.id === track.id;

                                        return (
                                            <div
                                                key={track.id}
                                                onClick={() => setSelectedElement({ id: track.id, trackType: 'video', target: track })}
                                                style={{ left: `${leftPercent}%`, width: `${widthPercent}%` }}
                                                className={`absolute top-1 bottom-1 ${track.color} rounded-md p-1.5 text-white text-[10px] cursor-pointer font-medium shadow-md transition-all flex flex-col justify-center truncate select-none border-2 ${isSelected ? 'border-white scale-[1.02] ring-2 ring-indigo-400 z-20' : 'border-transparent hover:brightness-110'}`}
                                            >
                                                <div className="font-bold truncate">{track.name}</div>
                                                <div className="opacity-80 font-mono text-[8px]">{track.start}s - {track.end}s ({track.speed}x)</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* TRACK 2: Graphic/Text Tracks Blocks */}
                            <div className="flex items-center h-12 border-b border-slate-900 relative my-1 group">
                                <div className="w-24 text-[11px] uppercase tracking-wider font-bold text-slate-400 flex items-center sticky left-0 z-10 bg-slate-950/80 pr-2">
                                    <i className="fas fa-font mr-1.5 text-amber-500 text-xs"></i> Gráficos
                                </div>
                                <div className="flex-1 h-full relative">
                                    {timelineData.timeline.graphicTracks.map(track => {
                                        const leftPercent = (track.start / timelineData.metadata.totalDuration) * 100;
                                        const widthPercent = ((track.end - track.start) / timelineData.metadata.totalDuration) * 100;
                                        const isSelected = selectedElement?.id === track.id;

                                        return (
                                            <div
                                                key={track.id}
                                                onClick={() => setSelectedElement({ id: track.id, trackType: 'graphic', target: track })}
                                                style={{ left: `${leftPercent}%`, width: `${widthPercent}%` }}
                                                className={`absolute top-1 bottom-1 ${track.color} rounded-md p-1.5 text-slate-950 text-[10px] cursor-pointer font-bold shadow-md transition-all flex flex-col justify-center truncate select-none border-2 ${isSelected ? 'border-white scale-[1.02] ring-2 ring-amber-400 z-20' : 'border-transparent hover:brightness-110'}`}
                                            >
                                                <div className="truncate">{track.name}</div>
                                                <div className="opacity-80 font-mono text-[8px] truncate">"{track.content}"</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
